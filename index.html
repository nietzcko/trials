<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vonalrajzos Trial Bringa - Továbbfejlesztett</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none; 
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            cursor: crosshair;
        }
        #instructions {
            position: absolute;
            top: 20px;
            text-align: center;
            color: #555;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 10px;
        }
        h2 { margin: 5px 0; font-size: 1.2rem; }
        p { margin: 5px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="instructions">
        <h2>Trial Bringa</h2>
        <p>Húzd hátra a lendülethez, és engedd el!</p>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Játékállapot
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        let dragDistance = 0; // Húzás mértéke

        // BEÁLLÍTÁSOK
        const jumpPower = 0.08; // Egy kicsit erősebb ugrás
        const gravity = 0.4;
        const bounceFactor = 0.6; 
        const poseStates = { GROUNDED: 0, AIRBORNE: 1, TAKING_OFF: 2 }; // Új: Póz állapotok

        // Bringa objektum (kör alapú fizika a stabil ütközéshez)
        const bike = {
            x: 100,
            y: 400,
            vx: 0,
            vy: 0,
            radius: 20, 
            angle: 0,
            angVel: 0,
            grounded: false,
            pose: poseStates.GROUNDED, // Kezdő póz
            tuckFactor: 0 // Levegőbeli összehúzódás mértéke
        };

        // Pályaelemek 
        const terrain = [
            { x: 0, y: 550, w: 800, h: 50 },    // Padló
            { x: 300, y: 450, w: 50, h: 100 },  // Első akadály
            { x: 500, y: 300, w: 150, h: 20 },  // Lebegő platform
            { x: 750, y: 0, w: 50, h: 600 },    // Jobb oldali fal
            { x: 0, y: 0, w: 20, h: 600 }       // Bal oldali fal
        ];

        // Mivel a canvast a CSS átméretezi, pontosan ki kell számolni az egér/érintés helyét
        function getPointerPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        // Interakciók
        function startDrag(x, y) {
            if (bike.grounded) {
                isDragging = true;
                dragStart = { x, y };
                dragCurrent = { x, y };
                bike.pose = poseStates.TAKING_OFF; // Átváltás lendületvétel pózra
            }
        }

        function moveDrag(x, y) {
            if (isDragging) {
                dragCurrent = { x, y };
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                dragDistance = Math.sqrt(dx * dx + dy * dy); // Húzás mértéke
            }
        }

        function endDrag() {
            if (isDragging) {
                isDragging = false;
                
                // Csúzli vektor kiszámítása
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                
                // Ha elég nagyot húztunk rajta
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                    bike.vx = dx * jumpPower;
                    bike.vy = dy * jumpPower;
                    
                    // Új: Lassú, kontrollált hátralefelé pörgés a húzás mértéke alapján (csak ha előre ugrunk)
                    if (dx > 0) {
                      bike.angVel = -0.005 - (dragDistance * 0.0001); // Nagyon kicsi negatív sebesség
                    } else {
                      bike.angVel = 0.005 + (dragDistance * 0.0001); // Nagyon kicsi pozitív sebesség, ha hátra ugrunk
                    }
                    
                    bike.grounded = false;
                    bike.pose = poseStates.AIRBORNE; // Átváltás levegőbeli pózra
                    bike.tuckFactor = 0; // Alaphelyzetből indul az összehúzódás
                } else {
                    bike.pose = poseStates.GROUNDED; // Ha nem ugrunk, visszatér az alap pózba
                }
                dragDistance = 0;
            }
        }

        // Egér események (PC)
        canvas.addEventListener('mousedown', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            startDrag(pos.x, pos.y);
        });
        canvas.addEventListener('mousemove', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            moveDrag(pos.x, pos.y);
        });
        window.addEventListener('mouseup', endDrag);

        // Érintőképernyő események (Mobil/Tablet)
        canvas.addEventListener('touchstart', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            startDrag(pos.x, pos.y);
        });
        canvas.addEventListener('touchmove', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            moveDrag(pos.x, pos.y);
        });
        window.addEventListener('touchend', endDrag);

        // Fizika frissítése
        function updatePhysics() {
            if (!bike.grounded) {
                // Gravitáció
                bike.vy += gravity;
                
                // Pozíció frissítése
                bike.x += bike.vx;
                bike.y += bike.vy;
                bike.angle += bike.angVel;

                // Új: Összehúzódás mértékének növelése a levegőben (szép lassan)
                bike.tuckFactor = Math.min(1, bike.tuckFactor + 0.05);

                // Ütközésvizsgálat (AABB - Kör ütközés)
                let hitGroundThisFrame = false;

                for (let t of terrain) {
                    let closestX = Math.max(t.x, Math.min(bike.x, t.x + t.w));
                    let closestY = Math.max(t.y, Math.min(bike.y, t.y + t.h));

                    let dx = bike.x - closestX;
                    let dy = bike.y - closestY;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < bike.radius) {
                        let nx = dx / distance;
                        let ny = dy / distance;

                        bike.x = closestX + nx * bike.radius;
                        bike.y = closestY + ny * bike.radius;

                        if (Math.abs(ny) > Math.abs(nx)) {
                            if (ny < 0) { 
                                bike.vy = 0;
                                bike.vx = 0; 
                                bike.angVel = 0;
                                hitGroundThisFrame = true;
                                bike.pose = poseStates.GROUNDED; // Földet érésnél alap pózra váltás
                            } else {
                                bike.vy = Math.abs(bike.vy) * 0.5;
                            }
                        } else {
                            bike.vx = -bike.vx * bounceFactor;
                            // Pattanáskor kicsit megkavarodik a dőlés, de nem drasztikusan
                            bike.angVel *= -0.8; 
                        }
                    }
                }

                if (hitGroundThisFrame) {
                    bike.grounded = true;
                }
            } else {
                // Lassú kiegyenesedés földet érés után
                bike.angle += (0 - bike.angle) * 0.1;
                bike.tuckFactor = Math.max(0, bike.tuckFactor - 0.1); 
                
                if (Math.abs(bike.angle) < 0.01) bike.angle = 0;
            }
            
            // Pályaelhagyás gátló (ha leesne alul)
            if (bike.y > canvas.height + 100) {
                bike.x = 100;
                bike.y = 400;
                bike.vx = 0;
                bike.vy = 0;
                bike.angle = 0;
                bike.pose = poseStates.GROUNDED;
            }
        }

        // Rajzolás
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Pálya rajzolása
            ctx.fillStyle = "#666";
            for (let t of terrain) {
                ctx.fillRect(t.x, t.y, t.w, t.h);
            }

            // Csúzli vonal rajzolása (Ha épp húzzuk)
            if (isDragging) {
                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                ctx.lineTo(bike.x + dx, bike.y + dy);
                ctx.strokeStyle = "rgba(255, 0, 0, 0.5)";
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]); // Visszaállítás
            }

            // Bringa és emberke rajzolása (transzformációkkal a dőlés miatt)
            ctx.save();
            ctx.translate(bike.x, bike.y);
            ctx.rotate(bike.angle);

            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            // Kerekek (relatív pozíció a középponthoz képest)
            ctx.beginPath();
            ctx.arc(-20, 10, 10, 0, Math.PI * 2); // Hátsó kerék
            ctx.moveTo(30, 10);
            ctx.arc(20, 10, 10, 0, Math.PI * 2);  // Első kerék
            ctx.stroke();

            // Bringa váz
            ctx.beginPath();
            ctx.moveTo(-20, 10); // Hátsó keréktől...
            ctx.lineTo(0, 10);   // Pedálokhoz...
            ctx.lineTo(15, -10); // Kormányhoz...
            ctx.lineTo(20, 10);  // Első kerékhez...
            ctx.moveTo(0, 10);   // Pedáloktól...
            ctx.lineTo(-5, -10); // Üléshez...
            ctx.lineTo(-20, 10); // Vissza a hátsó kerékhez
            ctx.stroke();

            // Új: Bringás (Stickman - Arifer) dinamikus testrészekkel
            ctx.beginPath();
            ctx.strokeStyle = "#1a73e8"; // Kék színű emberke
            
            // Definiáljuk az alap pozíciókat
            let butt = { x: -5, y: -10 };   // Fenék az ülésen
            let shoulder = { x: 5, y: -25 }; // Váll
            let head = { x: 8, y: -32 };     // Fej
            let hands = { x: 15, y: -10 };  // Kéz a kormányon
            let pedals = { x: 0, y: 10 };   // Láb a pedálon

            // Új: Lendületvétel (Crouch) drajzolása
            if (isDragging) {
              const dragX = dragStart.x - dragCurrent.x;
              const dragY = dragStart.y - dragCurrent.y;
              // A fenék és test hátra/le mozdul
              butt.x -= dragX * 0.15;
              butt.y += dragY * 0.1;
              shoulder.x -= dragX * 0.1;
              shoulder.y += dragY * 0.05;
              head.x -= dragX * 0.05;
              head.y += dragY * 0.02;
              // Karok kinyúlnak
            } else if (!bike.grounded && bike.pose === poseStates.AIRBORNE) {
              // Új: Összehúzódás a levegőben (Tuck)
              butt.x -= 8 * bike.tuckFactor;
              butt.y -= 5 * bike.tuckFactor;
              shoulder.x -= 2 * bike.tuckFactor;
              shoulder.y += 2 * bike.tuckFactor;
              // Lábak felhúzódnak a test felé
              pedals.x -= 10 * bike.tuckFactor;
              pedals.y -= 8 * bike.tuckFactor;
            }

            // Testrészek összekötése
            ctx.moveTo(butt.x, butt.y); // Fenék...
            ctx.lineTo(shoulder.x, shoulder.y); // ...gerinc a vállig
            
            ctx.moveTo(shoulder.x, shoulder.y); // Váll...
            ctx.lineTo(hands.x, hands.y); // ...kar a kormányra
            
            ctx.moveTo(butt.x, butt.y); // Fenék...
            ctx.lineTo(pedals.x, pedals.y); // ...láb a pedálra
            
            ctx.stroke();

            // Fej
            ctx.beginPath();
            ctx.arc(head.x, head.y, 5, 0, Math.PI * 2);
            ctx.stroke();

            ctx.restore();
        }

        // Fő játékciklus (Game Loop)
        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Indítás
        gameLoop();
    </script>
</body>
</html>
