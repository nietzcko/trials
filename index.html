<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vonalrajzos Trial Bringa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            /* Megakadályozza a mobil böngészők alapértelmezett görgetését/nagyítását a játéktéren */
            touch-action: none; 
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            /* Arányos átméretezés bármilyen képernyőre */
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            cursor: crosshair;
        }
        #instructions {
            position: absolute;
            top: 20px;
            text-align: center;
            color: #555;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 10px;
        }
        h2 { margin: 5px 0; font-size: 1.2rem; }
        p { margin: 5px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="instructions">
        <h2>Trial Bringa</h2>
        <p>Húzd hátra a képernyőn, és engedd el!</p>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Játékállapot
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };

        // BEÁLLÍTÁSOK
        const jumpPower = 0.06; // Kisebb szám = kisebb ugrás (Eredetileg 0.15 volt)
        const gravity = 0.4;
        const bounceFactor = 0.6; // Mennyire pattanjon vissza a falról

        // Bringa objektum (kör alapú fizika a stabil ütközéshez)
        const bike = {
            x: 100,
            y: 400,
            vx: 0,
            vy: 0,
            radius: 20, // A kerékpárunk befoglaló sugara
            angle: 0,
            angVel: 0,
            grounded: false
        };

        // Pályaelemek (Vízszintes és függőleges téglalapok)
        const terrain = [
            { x: 0, y: 550, w: 800, h: 50 },    // Padló
            { x: 300, y: 450, w: 50, h: 100 },  // Első akadály
            { x: 500, y: 300, w: 150, h: 20 },  // Lebegő platform
            { x: 750, y: 0, w: 50, h: 600 },    // Jobb oldali fal
            { x: 0, y: 0, w: 20, h: 600 }       // Bal oldali fal
        ];

        // Mivel a canvast a CSS átméretezi, pontosan ki kell számolni az egér/érintés helyét
        function getPointerPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        // Interakciók
        function startDrag(x, y) {
            if (bike.grounded) {
                isDragging = true;
                dragStart = { x, y };
                dragCurrent = { x, y };
            }
        }

        function moveDrag(x, y) {
            if (isDragging) {
                dragCurrent = { x, y };
            }
        }

        function endDrag() {
            if (isDragging) {
                isDragging = false;
                
                // Csúzli vektor kiszámítása
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                
                // Ha elég nagyot húztunk rajta
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                    bike.vx = dx * jumpPower;
                    bike.vy = dy * jumpPower;
                    // Ugrásnál fordul is a bringa a vízszintes sebességtől függően
                    bike.angVel = bike.vx * 0.02;
                    bike.grounded = false;
                }
            }
        }

        // Egér események (PC)
        canvas.addEventListener('mousedown', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            startDrag(pos.x, pos.y);
        });
        canvas.addEventListener('mousemove', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            moveDrag(pos.x, pos.y);
        });
        window.addEventListener('mouseup', endDrag);

        // Érintőképernyő események (Mobil/Tablet)
        canvas.addEventListener('touchstart', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            startDrag(pos.x, pos.y);
        });
        canvas.addEventListener('touchmove', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            moveDrag(pos.x, pos.y);
        });
        window.addEventListener('touchend', endDrag);

        // Fizika frissítése
        function updatePhysics() {
            if (!bike.grounded) {
                // Gravitáció
                bike.vy += gravity;
                
                // Pozíció frissítése
                bike.x += bike.vx;
                bike.y += bike.vy;
                bike.angle += bike.angVel;

                // Ütközésvizsgálat (AABB - Kör ütközés)
                let hitGroundThisFrame = false;

                for (let t of terrain) {
                    let closestX = Math.max(t.x, Math.min(bike.x, t.x + t.w));
                    let closestY = Math.max(t.y, Math.min(bike.y, t.y + t.h));

                    let dx = bike.x - closestX;
                    let dy = bike.y - closestY;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < bike.radius) {
                        let nx = dx / distance;
                        let ny = dy / distance;

                        bike.x = closestX + nx * bike.radius;
                        bike.y = closestY + ny * bike.radius;

                        if (Math.abs(ny) > Math.abs(nx)) {
                            if (ny < 0) { 
                                bike.vy = 0;
                                bike.vx = 0; 
                                bike.angVel = 0;
                                hitGroundThisFrame = true;
                            } else {
                                bike.vy = Math.abs(bike.vy) * 0.5;
                            }
                        } else {
                            bike.vx = -bike.vx * bounceFactor;
                            bike.angVel *= -0.5; 
                        }
                    }
                }

                if (hitGroundThisFrame) {
                    bike.grounded = true;
                }
            } else {
                let angleDiff = 0 - bike.angle;
                bike.angle += angleDiff * 0.1;
                
                if (Math.abs(bike.angle) < 0.01) bike.angle = 0;
            }
            
            // Pályaelhagyás gátló (ha leesne alul)
            if (bike.y > canvas.height + 50) {
                bike.x = 100;
                bike.y = 400;
                bike.vx = 0;
                bike.vy = 0;
            }
        }

        // Rajzolás
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Pálya rajzolása
            ctx.fillStyle = "#666";
            for (let t of terrain) {
                ctx.fillRect(t.x, t.y, t.w, t.h);
            }

            // Csúzli vonal rajzolása
            if (isDragging) {
                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                ctx.lineTo(bike.x + dx, bike.y + dy);
                ctx.strokeStyle = "rgba(255, 0, 0, 0.5)";
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Bringa és emberke rajzolása
            ctx.save();
            ctx.translate(bike.x, bike.y);
            ctx.rotate(bike.angle);

            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            // Kerekek
            ctx.beginPath();
            ctx.arc(-20, 10, 10, 0, Math.PI * 2); 
            ctx.moveTo(30, 10);
            ctx.arc(20, 10, 10, 0, Math.PI * 2);  
            ctx.stroke();

            // Bringa váz
            ctx.beginPath();
            ctx.moveTo(-20, 10); 
            ctx.lineTo(0, 10);   
            ctx.lineTo(15, -10); 
            ctx.lineTo(20, 10);  
            ctx.moveTo(0, 10);   
            ctx.lineTo(-5, -10); 
            ctx.lineTo(-20, 10); 
            ctx.stroke();

            // Bringás
            ctx.beginPath();
            ctx.strokeStyle = "#1a73e8"; 
            ctx.moveTo(-5, -10); 
            ctx.lineTo(5, -25);  
            ctx.lineTo(15, -10); 
            ctx.moveTo(-5, -10); 
            ctx.lineTo(0, 10);   
            ctx.moveTo(5, -25);
            ctx.arc(8, -32, 5, 0, Math.PI * 2); 
            ctx.stroke();

            ctx.restore();
        }

        // Fő játékciklus
        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Indítás
        gameLoop();
    </script>
</body>
</html>
