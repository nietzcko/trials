<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Trial - Vertical Survival</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --platform-body: #171d25;
            --neon-main: #00f3ff;
            --neon-alt: #ff0055;
            --neon-scored: #ffd700;
            --text-color: #c5c6c7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
            color: var(--text-color);
        }

        canvas {
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            max-width: 100vw;
            max-height: 100vh;
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: crosshair;
        }

        #ui-top {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            width: 100%;
            text-align: center;
        }

        .hud {
            display: inline-block;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.9);
            color: #fff;
        }

        .score-num {
            color: var(--neon-scored);
            font-size: 2rem;
            text-shadow: 0 0 15px var(--neon-scored), 0 4px 10px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="hud">
            SCORE: <span id="scoreDisplay" class="score-num">0</span>
        </div>
    </div>

    <canvas id="gameCanvas" width="540" height="960"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');

        const STATE_PLAYING = 0;
        const STATE_GAMEOVER = 1;

        let gameState = STATE_PLAYING;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };

        const maxDragDistance = 220;
        let score = 0;

        let cameraX = 0;
        let targetCameraX = 0;
        let cameraY = 0;
        let targetCameraY = 0;

        let bgPulse = 0;

        let genX = 0;
        let genY = 0;
        let lastObstacleType = 'rect';

        const getCSSVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        const colors = {
            main: getCSSVar('--neon-main'),
            alt: getCSSVar('--neon-alt'),
            scored: getCSSVar('--neon-scored'),
            platform: getCSSVar('--platform-body'),
            bg: getCSSVar('--bg-color')
        };

        const wheelColors = {
            rear: '#00f3ff',
            front: '#ff4fa3'
        };

        let tutorialShown = {
            wheelOrder: false
        };


        const jumpPower = 0.045;
        const gravity = 0.4;
        const bounceFactor = 0.4;
        const poseStates = { GROUNDED: 0, AIRBORNE: 1, TAKING_OFF: 2 };

        const AIR_ROTATE_MAX = -Math.PI / 4;
        const AIR_ROTATE_MIN = -0.08;
        const GROUND_ANGLE_LIMIT = 0.55;
        const ONE_WHEEL_POP = 0.22;
        const ONE_WHEEL_DROP = 0.18;

        let bike = {
            x: 150,
            y: 500,
            vx: 0,
            vy: 0,
            radius: 15,
            angle: 0,
            angVel: 0,
            grounded: false,
            pose: poseStates.GROUNDED,
            tuckFactor: 0,
            dir: 1,
            targetAirAngle: 0,
            airRotateStrength: 0.12,
            airRotateBlend: 0,
            landingRecover: 0,
            groundAngle: 0
        };

        let terrain = [];

        function updateHUD() {
            scoreDisplay.innerText = score;
        }

        function clamp(v, min, max) {
            return Math.max(min, Math.min(max, v));
        }

        function getWheelColorName(partName) {
            if (partName === 'rear') return 'rear';
            if (partName === 'front') return 'front';
            return null;
        }

        function getWheelColorValue(partName) {
            const key = getWheelColorName(partName);
            return key ? wheelColors[key] : null;
        }

        function getWheelPlatformFill(requiredWheel) {
            return 'rgba(23, 29, 37, 0.96)';
        }

        function generateObstacle() {
            let gapX = 70 + Math.random() * 80;
            let startX = genX + gapX;
            const fromTrickySupport = lastObstacleType === 'break' || lastObstacleType === 'seesaw';

            let type = Math.floor(Math.random() * 15);

            if (genY < 250) type = Math.max(type, 3);
            if (genY > 750) type = Math.min(type, 2);

            if (type === 0) {
                let w = 30 + Math.random() * 80;
                let y = genY + (fromTrickySupport ? (Math.random() * 120 - 45) : (Math.random() * 260 - 140));
                terrain.push({type: 'rect', x: startX, y: y, w: w, h: 30, landed: false});
                genX = startX + w;
                genY = y;
                lastObstacleType = 'rect';
            }
            else if (type === 1) {
                let r = 20 + Math.random() * 30;
                let y = genY + (fromTrickySupport ? (Math.random() * 100 - 35) : (Math.random() * 200 - 100));
                terrain.push({type: 'circle', x: startX + r, y: y, r: r, landed: false});
                genX = startX + r * 2;
                genY = y - r;
                lastObstacleType = 'circle';
            }
            else if (type === 2) {
                let currX = startX;
                let currY = genY;
                let stepW = 30 + Math.random() * 20;
                for(let i=0; i<3; i++) {
                    terrain.push({type: 'rect', x: currX, y: currY, w: stepW, h: 40, landed: false});
                    currX += stepW + 10;
                    currY -= (40 + Math.random() * 20);
                }
                genX = currX;
                genY = currY + 40;
                lastObstacleType = 'stairsUp';
            }
            else if (type === 3) {
                let currX = startX;
                let currY = genY;
                let stepW = 30 + Math.random() * 20;
                for(let i=0; i<3; i++) {
                    terrain.push({type: 'rect', x: currX, y: currY, w: stepW, h: 40, landed: false});
                    currX += stepW + 10;
                    currY += (40 + Math.random() * 20);
                }
                genX = currX;
                genY = currY - 40;
                lastObstacleType = 'stairsDown';
            }
            else if (type === 4) {
                let w = 80 + Math.random() * 50;
                let h = 25; let angle = -0.45;
                terrain.push({type: 'slope', x: startX, y: genY, w: w, h: h, angle: angle, landed: false});
                genX = startX + w * Math.cos(angle);
                genY = genY + w * Math.sin(angle);
                lastObstacleType = 'slope';
            }
            else if (type === 5) {
                let w = 80 + Math.random() * 50;
                let h = 25; let angle = 0.45;
                terrain.push({type: 'slope', x: startX, y: genY, w: w, h: h, angle: angle, landed: false});
                genX = startX + w * Math.cos(angle);
                genY = genY + w * Math.sin(angle);
            }
            else if (type === 6) {
                let currX = startX;
                let baseY = genY + (Math.random() * 80 - 40);
                let count = 2 + Math.floor(Math.random() * 3);

                for (let i = 0; i < count; i++) {
                    let w = 24 + Math.random() * 22;
                    let gap = 35 + Math.random() * 45;
                    terrain.push({type: 'rect', x: currX, y: baseY, w: w, h: 22, landed: false});
                    currX += w + gap;
                }

                genX = currX;
                genY = baseY;
                lastObstacleType = 'gaps';
            }
            else if (type === 7) {
                let baseY = genY + (Math.random() * 60 - 30);
                let lowW = 36 + Math.random() * 18;
                let highW = 34 + Math.random() * 18;
                let gap = 18 + Math.random() * 18;
                let stepUp = 45 + Math.random() * 30;

                terrain.push({type: 'rect', x: startX, y: baseY, w: lowW, h: 24, landed: false});
                terrain.push({type: 'rect', x: startX + lowW + gap, y: baseY - stepUp, w: highW, h: 24, landed: false});

                genX = startX + lowW + gap + highW;
                genY = baseY - stepUp;
                lastObstacleType = 'stepUp';
            }
            else if (type === 8) {
                let baseY = genY + (Math.random() * 50 - 25);
                let kickerW = 26 + Math.random() * 12;
                let kickerH = 20;
                let gap = 28 + Math.random() * 24;
                let landW = 54 + Math.random() * 28;

                terrain.push({type: 'slope', x: startX, y: baseY, w: kickerW, h: kickerH, angle: -0.32, landed: false});
                let landX = startX + kickerW + gap;
                terrain.push({type: 'rect', x: landX, y: baseY - 8, w: landW, h: 24, landed: false});

                genX = landX + landW;
                genY = baseY - 8;
                lastObstacleType = 'kicker';
            }
            else if (type === 9) {
                let currX = startX;
                let currY = genY + (Math.random() * 40 - 20);
                let count = 3 + Math.floor(Math.random() * 2);

                for (let i = 0; i < count; i++) {
                    let w = 22 + Math.random() * 14;
                    terrain.push({type: 'rect', x: currX, y: currY, w: w, h: 20, landed: false});
                    currX += w + (18 + Math.random() * 18);
                    currY -= 24 + Math.random() * 18;
                }

                genX = currX;
                genY = currY + 28;
                lastObstacleType = 'pillarRise';
            }
            else if (type === 10) {
                let w = 80 + Math.random() * 40;
                let y = genY + (Math.random() * 80 - 40);
                terrain.push({
                    type: 'moving', x: startX, y: y, baseX: startX, w: w, h: 22,
                    range: 28 + Math.random() * 18, speed: 0.002 + Math.random() * 0.003,
                    phase: Math.random() * Math.PI * 2, moveDX: 0, landed: false
                });
                genX = startX + w + 40;
                genY = y;
                lastObstacleType = 'moving';
            }
            else if (type === 11) {
                let baseY = genY + (Math.random() * 40 - 20);
                let leadW = 86 + Math.random() * 32;
                let gap = 32 + Math.random() * 12;
                let landW = 58 + Math.random() * 24;

                terrain.push({type: 'rect', x: startX, y: baseY, w: leadW, h: 24, landed: false});
                terrain.push({type: 'laser', x: startX + leadW + gap * 0.5, y: baseY - 50, w: 8, h: 30, landed: false});
                terrain.push({type: 'rect', x: startX + leadW + gap, y: baseY, w: landW, h: 24, landed: false});

                genX = startX + leadW + gap + landW;
                genY = baseY;
                lastObstacleType = 'laser';
            }
            else if (type === 12) {
                let w = 60 + Math.random() * 30;
                let y = genY + (Math.random() * 50 - 20);
                terrain.push({
                    type: 'break', x: startX, y: y, w: w, h: 24,
                    timer: 0, breaking: false, dead: false, landed: false
                });
                genX = startX + w + 35;
                genY = y;
                lastObstacleType = 'break';
            }
            else if (type === 13) {
                let y = genY + (Math.random() * 60 - 30);
                let size = (26 + Math.random() * 10) * 1.4;
                let requiredWheel = Math.random() < 0.5 ? 'rear' : 'front';

                terrain.push({
                    type: 'wheelGate',
                    x: startX,
                    y: y,
                    w: size,
                    h: size,
                    landed: false,
                    requiredWheel: requiredWheel,
                    triggered: false,
                    showHint: !tutorialShown.wheelOrder
                });

                if (!tutorialShown.wheelOrder) {
                    tutorialShown.wheelOrder = true;
                }

                genX = startX + size + 24;
                genY = y;
                lastObstacleType = 'wheelGate';
            }
            else if (type === 14) {
                let y = genY + (Math.random() * 36 - 18);
                let w = 92 + Math.random() * 28;
                terrain.push({
                    type: 'seesaw',
                    x: startX,
                    y: y,
                    w: w,
                    h: 18,
                    angle: 0,
                    landed: false
                });
                genX = startX + w + 34;
                genY = y;
                lastObstacleType = 'seesaw';
            }
        }

        function initGame() {
            score = 0;
            terrain = [];
            tutorialShown.wheelOrder = false;
            updateHUD();

            genX = 0; genY = 600;
            lastObstacleType = 'rect';
            terrain.push({ type: 'rect', x: 0, y: 600, w: 300, h: 50, landed: true });
            genX = 300;

            for(let i=0; i<10; i++) generateObstacle();

            bike.x = 150;
            bike.y = 550;
            bike.vx = 0;
            bike.vy = 0;
            bike.angle = 0;
            bike.angVel = 0;
            bike.pose = poseStates.GROUNDED;
            bike.grounded = true;
            bike.tuckFactor = 0;
            bike.targetAirAngle = 0;
            bike.airRotateStrength = 0.12;
            bike.airRotateBlend = 0;
            bike.landingRecover = 0;
            bike.groundAngle = 0;

            isDragging = false;

            targetCameraX = bike.x - 120;
            targetCameraY = bike.y - 650;
            cameraX = targetCameraX;
            cameraY = targetCameraY;
            gameState = STATE_PLAYING;
        }

        function getPointerPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX + cameraX,
                y: (clientY - rect.top) * scaleY + cameraY
            };
        }

        function startDrag(x, y) {
            if (gameState === STATE_GAMEOVER) { initGame(); return; }
            if (bike.grounded && gameState === STATE_PLAYING) {
                isDragging = true;
                dragStart = { x, y };
                dragCurrent = { x, y };
                bike.pose = poseStates.TAKING_OFF;
            }
        }

        function moveDrag(x, y) {
            if (isDragging && gameState === STATE_PLAYING) {
                dragCurrent = { x, y };
            }
        }

        function endDrag() {
            if (isDragging && gameState === STATE_PLAYING) {
                isDragging = false;
                let aimX = dragStart.x - dragCurrent.x;
                let aimY = dragStart.y - dragCurrent.y;
                let aimLen = Math.sqrt(aimX * aimX + aimY * aimY);

                if (aimLen > maxDragDistance) {
                    aimX = (aimX / aimLen) * maxDragDistance;
                    aimY = (aimY / aimLen) * maxDragDistance;
                    aimLen = maxDragDistance;
                }

                if (aimLen > 5) {
                    bike.vx = aimX * jumpPower;
                    bike.vy = aimY * jumpPower;

                    const pullRatio = Math.min(1, aimLen / maxDragDistance);
                    const horizontalRatio = Math.min(1, Math.abs(aimX) / maxDragDistance);
                    const naturalTurn = 0.35 * horizontalRatio + 0.65 * pullRatio;
                    const easedTurn = 1 - Math.pow(1 - naturalTurn, 2);

                    bike.targetAirAngle = AIR_ROTATE_MIN + (AIR_ROTATE_MAX - AIR_ROTATE_MIN) * easedTurn;
                    bike.airRotateStrength = 0.06 + easedTurn * 0.07;
                    bike.airRotateBlend = 0;
                    bike.angVel = 0;

                    bike.grounded = false;
                    bike.pose = poseStates.AIRBORNE;
                    bike.tuckFactor = 0;
                    bike.landingRecover = 0;
                } else {
                    bike.pose = poseStates.GROUNDED;
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            startDrag(pos.x, pos.y);
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            moveDrag(pos.x, pos.y);
        });

        window.addEventListener('mouseup', endDrag);

        canvas.addEventListener('touchstart', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            startDrag(pos.x, pos.y);
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            moveDrag(pos.x, pos.y);
        }, { passive: true });

        window.addEventListener('touchend', endDrag);

        function checkCollision(px, py, radius, t) {
            if (t.type === 'laser') {
                return { hit: false };
            }
            if (t.type === 'circle') {
                let dx = px - t.x;
                let dy = py - t.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < radius + t.r) return { hit: true, nx: dx/dist, ny: dy/dist, pen: (radius + t.r) - dist };
            }
            else if (t.type === 'slope' || t.type === 'seesaw') {
                let cx = t.x + t.w/2;
                let cy = t.y + t.h/2;
                let dx = px - cx;
                let dy = py - cy;
                let rdx = dx * Math.cos(-t.angle) - dy * Math.sin(-t.angle);
                let rdy = dx * Math.sin(-t.angle) + dy * Math.cos(-t.angle);
                let lwx = cx + rdx;
                let lwy = cy + rdy;

                let closestX = Math.max(t.x, Math.min(lwx, t.x + t.w));
                let closestY = Math.max(t.y, Math.min(lwy, t.y + t.h));
                let cdx = lwx - closestX;
                let cdy = lwy - closestY;
                let dist = Math.sqrt(cdx*cdx + cdy*cdy);

                if (dist < radius) {
                    let nx_l = dist === 0 ? 0 : cdx/dist;
                    let ny_l = dist === 0 ? -1 : cdy/dist;
                    if (dist === 0) { ny_l = -1; dist = 0.1; }
                    let nx = nx_l * Math.cos(t.angle) - ny_l * Math.sin(t.angle);
                    let ny = nx_l * Math.sin(t.angle) + ny_l * Math.cos(t.angle);
                    return { hit: true, nx: nx, ny: ny, pen: radius - dist };
                }
            }
            else {
                let closestX = Math.max(t.x, Math.min(px, t.x + t.w));
                let closestY = Math.max(t.y, Math.min(py, t.y + t.h));
                let dx = px - closestX;
                let dy = py - closestY;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < radius) {
                    let nx = dist === 0 ? 0 : dx/dist;
                    let ny = dist === 0 ? -1 : dy/dist;
                    if (dist === 0) { ny = -1; dist = 0.1; }
                    return { hit: true, nx: nx, ny: ny, pen: radius - dist };
                }
            }
            return { hit: false };
        }

        function updatePhysics() {
            targetCameraX = bike.x - 120;
            targetCameraY = bike.y - 650;
            cameraX += (targetCameraX - cameraX) * 0.08;
            cameraY += (targetCameraY - cameraY) * 0.08;

            bgPulse = (bgPulse + 0.002) % (Math.PI * 2);

            if (gameState !== STATE_PLAYING) return;

            if (cameraX + canvas.width > genX - 500) {
                generateObstacle();
            }

            const now = performance.now();
            for (let t of terrain) {
                if (t.type === 'moving') {
                    let prevX = t.x;
                    t.x = t.baseX + Math.sin(now * t.speed + t.phase) * t.range;
                    t.moveDX = t.x - prevX;
                }
                else if (t.type === 'break' && t.breaking) {
                    t.timer++;
                    if (t.timer > 75) {
                        t.y += 0.9;
                    }
                    if (t.timer > 120) t.dead = true;
                }
                else if (t.type === 'seesaw') {
                    t.angle *= 0.94;
                    if (Math.abs(t.angle) < 0.0015) t.angle = 0;
                }
            }
            terrain = terrain.filter(t => !t.dead && t.x > cameraX - 1000);


            bike.vy += gravity;

            if (!bike.grounded) {
                bike.tuckFactor = Math.min(1, bike.tuckFactor + 0.05);
                bike.airRotateBlend = Math.min(1, bike.airRotateBlend + 0.05);

                const riseFactor = clamp(-bike.vy / 8, 0, 1);
                const fallFactor = clamp(bike.vy / 10, 0, 1);
                const dynamicTarget = bike.targetAirAngle + riseFactor * -0.06 + fallFactor * 0.04;
                const clampedDynamicTarget = clamp(dynamicTarget, AIR_ROTATE_MAX, -0.02);

                const diff = clampedDynamicTarget - bike.angle;
                const strength = bike.airRotateStrength * (0.75 + bike.airRotateBlend * 0.5);
                bike.angle += diff * strength;

                if (Math.abs(diff) < 0.0015) {
                    bike.angle = clampedDynamicTarget;
                }

                bike.angle = clamp(bike.angle, AIR_ROTATE_MAX, 0.18);
            }

            if (isDragging && bike.grounded) {
                const pullX = dragCurrent.x - dragStart.x;
                let targetAngle = (pullX / maxDragDistance) * 0.45;
                targetAngle = clamp(targetAngle, -0.45, 0.45);
                bike.angle += (targetAngle - bike.angle) * 0.14;
            }

            bike.x += bike.vx;
            bike.y += bike.vy;

            let headRx = 8 * bike.dir;
            let headRy = -52;
            let headWx = bike.x + Math.cos(bike.angle)*headRx - Math.sin(bike.angle)*headRy;
            let headWy = bike.y + Math.sin(bike.angle)*headRx + Math.cos(bike.angle)*headRy;

            for (let t of terrain) {
                if (t.type === 'laser') {
                    let inX = headWx > t.x && headWx < t.x + t.w;
                    let inY = headWy > t.y && headWy < t.y + t.h;
                    if (inX && inY) {
                        gameState = STATE_GAMEOVER;
                        return;
                    }
                }
            }

            for (let t of terrain) {
                let hitResult = checkCollision(headWx, headWy, 12, t);
                if (hitResult.hit) {
                    gameState = STATE_GAMEOVER;
                    return;
                }
            }

            let hitGroundThisFrame = false;
            let rearContact = null;
            let frontContact = null;
            let pedalContact = null;

            const collisionPoints = [
                { name: 'rear',  rx: -25 * bike.dir, ry: 10, radius: 12 },
                { name: 'front', rx: 30 * bike.dir,  ry: 10, radius: 12 },
                { name: 'pedal', rx: 0,              ry: 10, radius: 6 },
                { name: 'body',  rx: 0,              ry: 0,  radius: 10 }
            ];

            for (let p of collisionPoints) {
                let wx = bike.x + Math.cos(bike.angle)*p.rx - Math.sin(bike.angle)*p.ry;
                let wy = bike.y + Math.sin(bike.angle)*p.rx + Math.cos(bike.angle)*p.ry;

                let leftBound = cameraX - 50;
                if (wx - p.radius < leftBound) {
                    bike.x += Math.abs(wx - p.radius - leftBound);
                    bike.vx = Math.abs(bike.vx) * bounceFactor;
                    wx = leftBound + p.radius;
                }

                for (let t of terrain) {
                    if (t.type === 'laser') {
                        let closestX = Math.max(t.x, Math.min(wx, t.x + t.w));
                        let closestY = Math.max(t.y, Math.min(wy, t.y + t.h));
                        let dx = wx - closestX;
                        let dy = wy - closestY;
                        if (dx * dx + dy * dy < p.radius * p.radius) {
                            gameState = STATE_GAMEOVER;
                            return;
                        }
                        continue;
                    }

                    let c = checkCollision(wx, wy, p.radius, t);
                    if (c.hit) {
                        if (t.type === 'wheelGate' && !t.triggered) {
                            if (p.name === 'rear' || p.name === 'front') {
                                t.triggered = true;
                                t.showHint = false;
                                if (p.name !== t.requiredWheel) {
                                    gameState = STATE_GAMEOVER;
                                    return;
                                }
                            } else {
                                gameState = STATE_GAMEOVER;
                                return;
                            }
                        }

                        if (t.type === 'seesaw') {
                            const localOffset = clamp((wx - (t.x + t.w / 2)) / (t.w * 0.5), -1, 1);
                            const desiredAngle = localOffset * 0.34;
                            t.angle += (desiredAngle - t.angle) * 0.22;
                        }

                        bike.x += c.nx * c.pen;
                        bike.y += c.ny * c.pen;

                        if (t.type === 'break' && c.ny < -0.5 && (p.name === 'rear' || p.name === 'front' || p.name === 'pedal')) {
                            t.breaking = true;
                        }

                        if (!t.landed && c.ny < -0.5 && (p.name === 'rear' || p.name === 'front' || p.name === 'pedal')) {
                            t.landed = true;
                            score++;
                            updateHUD();
                        }

                        if (Math.abs(c.ny) > Math.abs(c.nx)) {
                            if (c.ny < 0) {
                                if (p.name === 'rear') {
                                    rearContact = { wx, wy, nx: c.nx, ny: c.ny };
                                }
                                if (p.name === 'front') {
                                    frontContact = { wx, wy, nx: c.nx, ny: c.ny };
                                }
                                if (p.name === 'pedal') {
                                    pedalContact = { wx, wy, nx: c.nx, ny: c.ny };
                                }

                                if (t.type === 'moving') {
                                    bike.x += t.moveDX || 0;
                                }
                                bike.vy = 0;
                                if (p.name === 'rear' || p.name === 'front') bike.vx *= 0.35;
                                if (p.name === 'pedal') bike.vx *= 0.92;
                                bike.angVel = 0;
                                bike.targetAirAngle = 0;
                                bike.airRotateStrength = 0.12;
                                bike.airRotateBlend = 0;
                                bike.landingRecover = 1;
                                hitGroundThisFrame = true;
                                bike.pose = poseStates.GROUNDED;
                            } else {
                                bike.vy = Math.abs(bike.vy) * 0.5;
                            }
                        } else {
                            bike.vx = -bike.vx * bounceFactor;
                        }
                    }
                }
            }

            if (hitGroundThisFrame) {
                if (rearContact && frontContact) {
                    const dx = frontContact.wx - rearContact.wx;
                    const dy = frontContact.wy - rearContact.wy;
                    bike.groundAngle = Math.atan2(dy, dx);
                } else if (rearContact) {
                    const surfaceAngle = Math.atan2(rearContact.ny, rearContact.nx) + Math.PI / 2;
                    bike.groundAngle = surfaceAngle - ONE_WHEEL_POP;
                } else if (frontContact) {
                    const surfaceAngle = Math.atan2(frontContact.ny, frontContact.nx) + Math.PI / 2;
                    bike.groundAngle = surfaceAngle - ONE_WHEEL_DROP;
                } else if (pedalContact) {
                    const surfaceAngle = Math.atan2(pedalContact.ny, pedalContact.nx) + Math.PI / 2;
                    bike.groundAngle = surfaceAngle - 0.05;
                }

                bike.groundAngle = clamp(bike.groundAngle, -GROUND_ANGLE_LIMIT, GROUND_ANGLE_LIMIT);
            }

            bike.grounded = hitGroundThisFrame;

            if (bike.grounded && !isDragging) {
                bike.landingRecover = Math.max(0, bike.landingRecover - 0.08);
                const droop = pedalContact && !rearContact && !frontContact ? -0.03 * bike.landingRecover : -0.08 * bike.landingRecover;
                const settleTarget = bike.groundAngle + droop;

                bike.angle += (settleTarget - bike.angle) * 0.16;

                if (Math.abs(settleTarget - bike.angle) < 0.002 && bike.landingRecover <= 0.02) {
                    bike.angle += (bike.groundAngle - bike.angle) * 0.2;
                }

                bike.tuckFactor = Math.max(0, bike.tuckFactor - 0.1);
            }

            if (bike.y > cameraY + canvas.height + 100) gameState = STATE_GAMEOVER;
        }

        function draw() {
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let centerPulse = Math.sin(bgPulse) * 0.03 + 0.03;
            let grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
            grad.addColorStop(0, `rgba(102, 252, 241, ${centerPulse})`);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cameraX, -cameraY);

            ctx.lineJoin = 'miter';
            ctx.lineCap = 'butt';

            for (let t of terrain) {
                ctx.fillStyle = colors.platform;
                let edgeColor = t.landed ? colors.scored : colors.main;

                if (t.type === 'rect' || t.type === 'moving' || t.type === 'break' || t.type === 'wheelGate') {
                    if (t.type === 'break') {
                        ctx.fillStyle = colors.platform;
                        edgeColor = colors.main;
                    }

                    if (t.type === 'wheelGate') {
                        ctx.fillStyle = getWheelPlatformFill(t.requiredWheel);
                        edgeColor = t.requiredWheel === 'rear' ? wheelColors.rear : wheelColors.front;
                    }

                    ctx.fillRect(t.x, t.y, t.w, t.h);
                    ctx.beginPath();
                    ctx.moveTo(t.x, t.y+1);
                    ctx.lineTo(t.x+t.w, t.y+1);
                    ctx.lineWidth = t.landed ? 3 : 2;
                    ctx.strokeStyle = t.landed ? colors.scored : edgeColor;
                    ctx.stroke();

                    if (t.type === 'moving') {
                        ctx.beginPath();
                        ctx.moveTo(t.x + 12, t.y + t.h - 4);
                        ctx.lineTo(t.x + t.w - 12, t.y + t.h - 4);
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = 'rgba(255,255,255,0.28)';
                        ctx.stroke();
                    }

                    if (t.type === 'break') {
                        const crackColor = t.breaking ? 'rgba(0, 243, 255, 0.95)' : 'rgba(0, 243, 255, 0.72)';
                        ctx.strokeStyle = crackColor;
                        ctx.lineWidth = 1.8;

                        ctx.beginPath();
                        ctx.moveTo(t.x + t.w * 0.18, t.y + 5);
                        ctx.lineTo(t.x + t.w * 0.36, t.y + t.h * 0.42);
                        ctx.lineTo(t.x + t.w * 0.28, t.y + t.h - 5);
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.moveTo(t.x + t.w * 0.55, t.y + 4);
                        ctx.lineTo(t.x + t.w * 0.48, t.y + t.h * 0.38);
                        ctx.lineTo(t.x + t.w * 0.66, t.y + t.h * 0.62);
                        ctx.lineTo(t.x + t.w * 0.58, t.y + t.h - 4);
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.moveTo(t.x + t.w * 0.8, t.y + 6);
                        ctx.lineTo(t.x + t.w * 0.72, t.y + t.h * 0.34);
                        ctx.lineTo(t.x + t.w * 0.84, t.y + t.h * 0.56);
                        ctx.stroke();
                    }

                    if (t.type === 'wheelGate') {
                        const cx = t.x + t.w / 2;
                        const cy = t.y + t.h / 2;
                        const r = Math.min(t.w, t.h) * 0.22;

                        ctx.save();
                        ctx.strokeStyle = t.landed ? colors.scored : edgeColor;
                        ctx.lineWidth = 2;

                        ctx.setLineDash([]);
                        ctx.lineCap = 'butt';
                        ctx.strokeStyle = t.landed ? colors.scored : (t.requiredWheel === 'front' ? wheelColors.front : wheelColors.rear);
                        ctx.lineWidth = 2.2;
                        ctx.beginPath();
                        ctx.arc(cx, cy, r * 0.78, 0, Math.PI * 2);
                        ctx.stroke();

                        ctx.restore();
                    }
                }
                else if (t.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.lineWidth = t.landed ? 3 : 2;
                    ctx.strokeStyle = edgeColor;
                    ctx.stroke();
                }
                else if (t.type === 'slope') {
                    ctx.save();
                    ctx.translate(t.x + t.w/2, t.y + t.h/2);
                    ctx.rotate(t.angle);
                    ctx.translate(-(t.x + t.w/2), -(t.y + t.h/2));
                    ctx.fillRect(t.x, t.y, t.w, t.h);
                    ctx.beginPath();
                    ctx.moveTo(t.x, t.y+1);
                    ctx.lineTo(t.x+t.w, t.y+1);
                    ctx.lineWidth = t.landed ? 3 : 2;
                    ctx.strokeStyle = edgeColor;
                    ctx.stroke();
                    ctx.restore();
                }
                else if (t.type === 'seesaw') {
                    const cx = t.x + t.w / 2;
                    const cy = t.y + t.h / 2;
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(t.angle);
                    ctx.translate(-cx, -cy);
                    ctx.fillStyle = colors.platform;
                    ctx.fillRect(t.x, t.y, t.w, t.h);
                    ctx.beginPath();
                    ctx.moveTo(t.x, t.y + 1);
                    ctx.lineTo(t.x + t.w, t.y + 1);
                    ctx.lineWidth = t.landed ? 3 : 2;
                    ctx.strokeStyle = t.landed ? colors.scored : colors.main;
                    ctx.stroke();
                    ctx.restore();

                    ctx.beginPath();
                    ctx.moveTo(cx - 16, t.y + t.h + 12);
                    ctx.lineTo(cx, t.y + t.h - 2);
                    ctx.lineTo(cx + 16, t.y + t.h + 12);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = 'rgba(255,255,255,0.32)';
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(cx, t.y + t.h - 1, 4, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.72)';
                    ctx.fill();
                }
                else if (t.type === 'laser') {
                    ctx.fillStyle = 'rgba(255, 0, 85, 0.16)';
                    ctx.fillRect(t.x, t.y, t.w, t.h);
                    ctx.strokeStyle = colors.alt;
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = colors.alt;
                    ctx.strokeRect(t.x, t.y, t.w, t.h);
                    ctx.beginPath();
                    ctx.moveTo(t.x + t.w * 0.5, t.y + 10);
                    ctx.lineTo(t.x + t.w * 0.5, t.y + t.h - 10);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            }

            for (let t of terrain) {
                if (t.type === 'wheelGate' && t.showHint && !t.triggered) {
                    const lines = [
                        'Cyan ring = rear wheel',
                        'Pink ring = front wheel',
                        'Touch first with that wheel'
                    ];
                    const baseX = t.x + t.w / 2;
                    const baseY = t.y - 44;

                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.font = 'bold 16px system-ui, sans-serif';
                    ctx.fillStyle = ctx.strokeStyle;
                    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
                    ctx.lineWidth = 5;

                    for (let i = 0; i < lines.length; i++) {
                        const y = baseY + i * 18;
                        ctx.strokeText(lines[i], baseX, y);
                        ctx.fillText(lines[i], baseX, y);
                    }
                    ctx.restore();
                }
            }

            if (isDragging && gameState === STATE_PLAYING) {
                let aimX = dragStart.x - dragCurrent.x;
                let aimY = dragStart.y - dragCurrent.y;
                let dragX = dragCurrent.x - dragStart.x;
                let dragY = dragCurrent.y - dragStart.y;
                let aimLen = Math.sqrt(aimX * aimX + aimY * aimY);

                if (aimLen > maxDragDistance) {
                    aimX = (aimX / aimLen) * maxDragDistance;
                    aimY = (aimY / aimLen) * maxDragDistance;
                    dragX = (dragX / aimLen) * maxDragDistance;
                    dragY = (dragY / aimLen) * maxDragDistance;
                }

                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + aimX, bike.y + aimY);
                ctx.strokeStyle = 'rgba(102, 252, 241, 0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 6]);
                ctx.stroke();

                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + dragX, bike.y + dragY);
                ctx.strokeStyle = 'rgba(255, 0, 85, 0.6)';
                ctx.lineWidth = 3;
                ctx.stroke();

                if (aimLen >= maxDragDistance) {
                    ctx.beginPath();
                    ctx.fillStyle = colors.alt;
                    ctx.arc(bike.x + dragX, bike.y + dragY, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.save();
            ctx.translate(bike.x, bike.y);
            ctx.rotate(bike.angle);
            ctx.scale(bike.dir, 1);
            ctx.lineCap = 'square';
            ctx.lineJoin = 'miter';

            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(-22, 12, 12, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(-22, 12, 8, 0, Math.PI * 2);
            ctx.strokeStyle = wheelColors.rear;
            ctx.lineWidth = 2.4;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(25, 12, 12, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(25, 12, 8, 0, Math.PI * 2);
            ctx.strokeStyle = wheelColors.front;
            ctx.lineWidth = 2.2;
            ctx.stroke();

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();

            ctx.moveTo(-22, 12);
            ctx.lineTo(1, 5);
            ctx.lineTo(15, -10);
            ctx.lineTo(25, 12);

            ctx.moveTo(15, -10);
            ctx.lineTo(-5, -1);
            ctx.lineTo(-22, 12);

            ctx.moveTo(-5, -1);
            ctx.lineTo(1, 5);

            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-7, -3);
            ctx.lineTo(-2, -4);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(15, -10);
            ctx.lineTo(20, -20);
            ctx.lineTo(24, -23);
            ctx.stroke();

            ctx.beginPath();
            ctx.strokeStyle = gameState !== STATE_PLAYING ? colors.alt : colors.main;
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10;
            ctx.shadowColor = ctx.strokeStyle;

            const hands = { x: 24, y: -23 };
            const pedals = { x: 1, y: 5 };
            let butt = { x: -7, y: -17 };
            let shoulder = { x: 5, y: -39 };
            let head = { x: 10, y: -49 };

            if (isDragging && gameState === STATE_PLAYING) {
                const pullX = dragCurrent.x - dragStart.x;
                const pullY = dragCurrent.y - dragStart.y;
                const localPullX = pullX * bike.dir;
                let pullLen = Math.sqrt(localPullX*localPullX + pullY*pullY);

                if (pullLen > 0) {
                    let moveDist = Math.min(pullLen, maxDragDistance);
                    butt.x += (localPullX/pullLen)*(moveDist*0.10);
                    butt.y += (pullY/pullLen)*(moveDist*0.10);
                    shoulder.x += (localPullX/pullLen)*(moveDist*0.14);
                    shoulder.y += (pullY/pullLen)*(moveDist*0.14);
                    head.x += (localPullX/pullLen)*(moveDist*0.14);
                    head.y += (pullY/pullLen)*(moveDist*0.14);
                }
            } else if (!bike.grounded && bike.pose === poseStates.AIRBORNE) {
                const airy = bike.tuckFactor;
                butt.x += 7 * airy;
                butt.y += 7 * airy;
                shoulder.x += 10 * airy;
                shoulder.y += 10 * airy;
                head.x += 10 * airy;
                head.y += 10 * airy;
            }

            ctx.moveTo(butt.x, butt.y);
            ctx.lineTo(shoulder.x, shoulder.y);

            let armMx = (shoulder.x + hands.x) / 2 - 3;
            let armMy = (shoulder.y + hands.y) / 2 - 5;
            ctx.moveTo(shoulder.x, shoulder.y);
            ctx.lineTo(armMx, armMy);
            ctx.lineTo(hands.x, hands.y);

            let legMx = (butt.x + pedals.x) / 2 + 8;
            let legMy = (butt.y + pedals.y) / 2 - 2;
            ctx.moveTo(butt.x, butt.y);
            ctx.lineTo(legMx, legMy);
            ctx.lineTo(pedals.x, pedals.y);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(head.x, head.y, 8, 0, Math.PI * 2);
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.restore();
            ctx.restore();

            if (gameState === STATE_GAMEOVER) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = colors.alt;
                ctx.font = 'bold 55px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('CRASHED', canvas.width / 2, canvas.height / 2 - 40);
                ctx.font = '30px sans-serif';
                ctx.fillStyle = colors.scored;
                ctx.fillText(`SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 10);
                ctx.fillStyle = '#fff';
                ctx.font = '16px sans-serif';
                ctx.fillText('Click anywhere to restart!', canvas.width / 2, canvas.height / 2 + 70);
            }
        }

        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>
