<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Trial - Sunset Heat</title>
    <style>
        :root {
            /* VAGÁNY MELEG SZÍNEK */
            --bg-color: #1a0633;        /* Mély lila/fekete */
            --platform-body: #2d0b4d;   /* Sötét bíbor */
            --neon-main: #ff00ff;       /* Magenta neon */
            --neon-alt: #ffcc00;        /* Borostyán sárga */
            --neon-scored: #ff6600;     /* Izzó narancs */
            --text-color: #ffd1ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color); 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none; 
            color: var(--text-color);
        }

        canvas {
            box-shadow: 0 0 60px rgba(255, 0, 255, 0.15);
            max-width: 100vw;
            max-height: 100vh;
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: crosshair;
        }

        #ui-top {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            width: 100%;
            text-align: center;
        }

        .hud {
            display: inline-block;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 1); 
            color: #fff;
        }

        .score-num { 
            color: var(--neon-alt); 
            font-size: 2.2rem; 
            text-shadow: 0 0 20px var(--neon-scored), 0 4px 10px rgba(0,0,0,1); 
        }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="hud">
            SCORE: <span id="scoreDisplay" class="score-num">0</span>
        </div>
    </div>

    <canvas id="gameCanvas" width="540" height="960"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');

        const STATE_PLAYING = 0;
        const STATE_GAMEOVER = 1; 

        let gameState = STATE_PLAYING;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        
        const maxDragDistance = 220;
        let score = 0;
        
        let cameraX = 0;
        let targetCameraX = 0;
        let cameraY = 0;
        let targetCameraY = 0;
        
        let bgPulse = 0; 
        let genX = 0;
        let genY = 0;

        let bgBuildings = [];
        let totalBgCycleWidth = 0;
        const parallaxFactor = 0.15; 

        const getCSSVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        const colors = {
            main: getCSSVar('--neon-main'),
            alt: getCSSVar('--neon-alt'),
            scored: getCSSVar('--neon-scored'),
            platform: getCSSVar('--platform-body'),
            bg: getCSSVar('--bg-color')
        };

        const jumpPower = 0.045; 
        const gravity = 0.4;
        const bounceFactor = 0.4; 
        const poseStates = { GROUNDED: 0, AIRBORNE: 1, TAKING_OFF: 2 }; 

        let bike = {
            x: 150, y: 500, vx: 0, vy: 0, radius: 15, 
            angle: 0, angVel: 0, grounded: false,
            pose: poseStates.GROUNDED, tuckFactor: 0,
            dir: 1 
        };

        let terrain = [];
        let tutorialTexts = [];

        function updateHUD() {
            scoreDisplay.innerText = score;
        }

        function generateObstacle() {
            let gapX = 70 + Math.random() * 80; 
            let startX = genX + gapX;
            let type = Math.floor(Math.random() * 6); 
            
            if (genY < 250) type = Math.max(type, 3); 
            if (genY > 750) type = Math.min(type, 2); 

            if (type === 0) { 
                let w = 30 + Math.random() * 80; 
                let y = genY + (Math.random() * 260 - 140);
                terrain.push({type: 'rect', x: startX, y: y, w: w, h: 30, landed: false});
                genX = startX + w; genY = y;
            } 
            else if (type === 1) { 
                let r = 20 + Math.random() * 30; 
                let y = genY + (Math.random() * 200 - 100);
                terrain.push({type: 'circle', x: startX + r, y: y, r: r, landed: false});
                genX = startX + r * 2; genY = y - r; 
            } 
            else if (type === 2) { 
                let currX = startX; let currY = genY; 
                let stepW = 30 + Math.random() * 20; 
                for(let i=0; i<3; i++) {
                    terrain.push({type: 'rect', x: currX, y: currY, w: stepW, h: 40, landed: false});
                    currX += stepW + 10; currY -= (40 + Math.random() * 20); 
                }
                genX = currX; genY = currY + 40;
            } 
            else if (type === 3) { 
                let currX = startX; let currY = genY; 
                let stepW = 30 + Math.random() * 20;
                for(let i=0; i<3; i++) {
                    terrain.push({type: 'rect', x: currX, y: currY, w: stepW, h: 40, landed: false});
                    currX += stepW + 10; currY += (40 + Math.random() * 20);
                }
                genX = currX; genY = currY - 40;
            } 
            else if (type === 4) { 
                let w = 80 + Math.random() * 50; 
                let h = 25; let angle = -0.45; 
                terrain.push({type: 'slope', x: startX, y: genY, w: w, h: h, angle: angle, landed: false});
                genX = startX + w * Math.cos(angle); genY = genY + w * Math.sin(angle);
            } 
            else if (type === 5) { 
                let w = 80 + Math.random() * 50; 
                let h = 25; let angle = 0.45; 
                terrain.push({type: 'slope', x: startX, y: genY, w: w, h: h, angle: angle, landed: false});
                genX = startX + w * Math.cos(angle); genY = genY + w * Math.sin(angle);
            }
        }

        function generateBgBuildings() {
            bgBuildings = [];
            totalBgCycleWidth = 0;
            for (let i = 0; i < 40; i++) {
                let b = {
                    w: 60 + Math.random() * 120,
                    h: 200 + Math.random() * 500
                };
                bgBuildings.push(b);
                totalBgCycleWidth += b.w + 15;
            }
        }

        function initGame() {
            score = 0;
            terrain = [];
            updateHUD();
            generateBgBuildings();
            
            terrain.push({ type: 'rect', x: -200, y: 600, w: 1800, h: 150, landed: true }); 
            terrain.push({ type: 'rect', x: 400, y: 530, w: 150, h: 30, landed: false }); 
            terrain.push({ type: 'rect', x: 650, y: 460, w: 120, h: 30, landed: false }); 
            terrain.push({ type: 'rect', x: 900, y: 390, w: 100, h: 30, landed: false }); 
            
            genX = 1600; genY = 600; 

            tutorialTexts = [
                { text: "DRAG & RELEASE TO JUMP", x: 250, y: 450 },
                { text: "TILT WITH DRAG DIRECTION", x: 650, y: 350 },
                { text: "DON'T HIT YOUR HEAD!", x: 1100, y: 250 },
                { text: "RIDE THE SUNSET!", x: 1600, y: 450 }
            ];
            
            for(let i=0; i<10; i++) generateObstacle();
            
            bike.x = 100; bike.y = 550; bike.vx = 0; bike.vy = 0; bike.angle = 0; bike.angVel = 0;
            bike.pose = poseStates.GROUNDED; bike.grounded = true; bike.tuckFactor = 0;
            isDragging = false;
            targetCameraX = bike.x - 120; targetCameraY = bike.y - 650;
            cameraX = targetCameraX; cameraY = targetCameraY; 
            gameState = STATE_PLAYING;
        }

        function getPointerPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (clientX - rect.left) * scaleX + cameraX, y: (clientY - rect.top) * scaleY + cameraY };
        }

        function startDrag(x, y) {
            if (gameState === STATE_GAMEOVER) { initGame(); return; }
            if (bike.grounded && gameState === STATE_PLAYING) {
                isDragging = true; dragStart = { x, y }; dragCurrent = { x, y };
                bike.pose = poseStates.TAKING_OFF; 
            }
        }

        function moveDrag(x, y) {
            if (isDragging && gameState === STATE_PLAYING) dragCurrent = { x, y };
        }

        function endDrag() {
            if (isDragging && gameState === STATE_PLAYING) {
                isDragging = false;
                let aimX = dragStart.x - dragCurrent.x;
                let aimY = dragStart.y - dragCurrent.y;
                let aimLen = Math.sqrt(aimX * aimX + aimY * aimY);
                if (aimLen > maxDragDistance) {
                    aimX = (aimX / aimLen) * maxDragDistance; aimY = (aimY / aimLen) * maxDragDistance;
                    aimLen = maxDragDistance; 
                }
                if (aimLen > 5) {
                    bike.vx = aimX * jumpPower; bike.vy = aimY * jumpPower;
                    bike.angVel = aimX * -0.0003; 
                    if (bike.angVel > 0.025) bike.angVel = 0.025;
                    if (bike.angVel < -0.025) bike.angVel = -0.025;
                    bike.grounded = false; bike.pose = poseStates.AIRBORNE; bike.tuckFactor = 0; 
                } else { bike.pose = poseStates.GROUNDED; }
            }
        }

        canvas.addEventListener('mousedown', (e) => { const pos = getPointerPos(e.clientX, e.clientY); startDrag(pos.x, pos.y); });
        canvas.addEventListener('mousemove', (e) => { const pos = getPointerPos(e.clientX, e.clientY); moveDrag(pos.x, pos.y); });
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', (e) => { const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY); startDrag(pos.x, pos.y); });
        canvas.addEventListener('touchmove', (e) => { const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY); moveDrag(pos.x, pos.y); });
        window.addEventListener('touchend', endDrag);

        function checkCollision(px, py, radius, t) {
            if (t.type === 'circle') {
                let dx = px - t.x; let dy = py - t.y; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < radius + t.r) return { hit: true, nx: dx/dist, ny: dy/dist, pen: (radius + t.r) - dist };
            } 
            else if (t.type === 'slope') {
                let cx = t.x + t.w/2; let cy = t.y + t.h/2;
                let dx = px - cx; let dy = py - cy;
                let rdx = dx * Math.cos(-t.angle) - dy * Math.sin(-t.angle);
                let rdy = dx * Math.sin(-t.angle) + dy * Math.cos(-t.angle);
                let lwx = cx + rdx; let lwy = cy + rdy;
                let closestX = Math.max(t.x, Math.min(lwx, t.x + t.w));
                let closestY = Math.max(t.y, Math.min(lwy, t.y + t.h));
                let cdx = lwx - closestX; let cdy = lwy - closestY;
                let dist = Math.sqrt(cdx*cdx + cdy*cdy);
                if (dist < radius) {
                    let nx_l = dist === 0 ? 0 : cdx/dist; let ny_l = dist === 0 ? -1 : cdy/dist;
                    if (dist === 0) { ny_l = -1; dist = 0.1; }
                    let nx = nx_l * Math.cos(t.angle) - ny_l * Math.sin(t.angle);
                    let ny = nx_l * Math.sin(t.angle) + ny_l * Math.cos(t.angle);
                    return { hit: true, nx: nx, ny: ny, pen: radius - dist };
                }
            } 
            else { 
                let closestX = Math.max(t.x, Math.min(px, t.x + t.w));
                let closestY = Math.max(t.y, Math.min(py, t.y + t.h));
                let dx = px - closestX; let dy = py - closestY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < radius) {
                    let nx = dist === 0 ? 0 : dx/dist; let ny = dist === 0 ? -1 : dy/dist;
                    if (dist === 0) { ny = -1; dist = 0.1; }
                    return { hit: true, nx: nx, ny: ny, pen: radius - dist };
                }
            }
            return { hit: false };
        }

        function updatePhysics() {
            targetCameraX = bike.x - 120; targetCameraY = bike.y - 650; 
            cameraX += (targetCameraX - cameraX) * 0.08; cameraY += (targetCameraY - cameraY) * 0.08;
            bgPulse = (bgPulse + 0.002) % (Math.PI * 2);

            if (gameState !== STATE_PLAYING) return;
            if (cameraX + canvas.width > genX - 500) {
                generateObstacle();
                terrain = terrain.filter(t => t.x > cameraX - 1000);
            }
            bike.vy += gravity;
            if (!bike.grounded) bike.tuckFactor = Math.min(1, bike.tuckFactor + 0.05);
            if (isDragging && bike.grounded) {
                const pullX = dragCurrent.x - dragStart.x;
                let targetAngle = (pullX / maxDragDistance) * 0.65; 
                targetAngle = Math.max(-0.65, Math.min(0.65, targetAngle));
                bike.angle += (targetAngle - bike.angle) * 0.15;
            }
            bike.x += bike.vx; bike.y += bike.vy; bike.angle += bike.angVel;
            while (bike.angle > Math.PI) bike.angle -= Math.PI * 2;
            while (bike.angle < -Math.PI) bike.angle += Math.PI * 2;

            let headRx = 10 * bike.dir; let headRy = -55;
            let headWx = bike.x + Math.cos(bike.angle)*headRx - Math.sin(bike.angle)*headRy;
            let headWy = bike.y + Math.sin(bike.angle)*headRx + Math.cos(bike.angle)*headRy;
            for (let t of terrain) {
                if (checkCollision(headWx, headWy, 12, t).hit) { gameState = STATE_GAMEOVER; return; }
            }

            let hitGroundThisFrame = false;
            const collisionPoints = [{ rx: -25 * bike.dir, ry: 10, radius: 12 }, { rx: 30 * bike.dir, ry: 10, radius: 12 }, { rx: 0, ry: 0, radius: 10 }];
            for (let p of collisionPoints) {
                let wx = bike.x + Math.cos(bike.angle)*p.rx - Math.sin(bike.angle)*p.ry;
                let wy = bike.y + Math.sin(bike.angle)*p.rx + Math.cos(bike.angle)*p.ry;
                let leftBound = cameraX - 50;
                if (wx - p.radius < leftBound) { 
                    bike.x += Math.abs(wx - p.radius - leftBound); bike.vx = Math.abs(bike.vx) * bounceFactor; 
                    bike.angVel *= -0.3; wx = leftBound + p.radius; 
                }
                for (let t of terrain) {
                    let c = checkCollision(wx, wy, p.radius, t);
                    if (c.hit) {
                        bike.x += c.nx * c.pen; bike.y += c.ny * c.pen;
                        if (!t.landed && c.ny < -0.5) { t.landed = true; score++; updateHUD(); }
                        if (Math.abs(c.ny) > Math.abs(c.nx)) {
                            if (c.ny < 0) { bike.vy = 0; bike.vx = 0; bike.angVel = 0; hitGroundThisFrame = true; bike.pose = poseStates.GROUNDED; }
                            else { bike.vy = Math.abs(bike.vy) * 0.5; }
                        } else { bike.vx = -bike.vx * bounceFactor; bike.angVel *= -0.3; }
                    }
                }
            }
            bike.grounded = hitGroundThisFrame;
            if (bike.grounded && !isDragging) {
                if (bike.angle * bike.dir > 0) { bike.angle += (-0.1 * bike.dir - bike.angle) * 0.1; }
                bike.tuckFactor = Math.max(0, bike.tuckFactor - 0.1); 
            }
            if (bike.y > cameraY + canvas.height + 100) gameState = STATE_GAMEOVER;
        }

        function draw() {
            // MELEG SZÍNES HÁTTÉR ÁTMENET (Sunset Style)
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, "#1a0633"); // Sötét lila felül
            skyGrad.addColorStop(0.6, "#4a1050"); // Magenta középen
            skyGrad.addColorStop(1, "#8a4010"); // Izzó narancs alul
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Radiális fény a horizonthoz
            let grad = ctx.createRadialGradient(canvas.width/2, canvas.height, 0, canvas.width/2, canvas.height, canvas.height);
            grad.addColorStop(0, `rgba(255, 102, 0, 0.15)`);
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // PARALLAX VÁROS (Meleg tónusokkal)
            ctx.save();
            const bgOffset = (cameraX * parallaxFactor) % totalBgCycleWidth;
            ctx.translate(-bgOffset, 0);
            ctx.fillStyle = "rgba(74, 16, 80, 0.4)"; // Sötét magenta épületek
            let currentX = 0;
            for (let i = 0; i < 2; i++) {
                for (let b of bgBuildings) {
                    ctx.fillRect(currentX, canvas.height - b.h - 50, b.w, b.h); 
                    currentX += b.w + 15;
                }
            }
            ctx.restore();

            ctx.save();
            ctx.translate(-cameraX, -cameraY);

            // Tutorial szövegek
            ctx.fillStyle = "rgba(255, 204, 0, 0.5)"; 
            ctx.font = "bold 24px sans-serif";
            ctx.textAlign = "center";
            for (let txt of tutorialTexts) ctx.fillText(txt.text, txt.x, txt.y);

            // Pálya
            ctx.lineJoin = "miter"; ctx.lineCap = "butt";
            for (let t of terrain) {
                ctx.fillStyle = colors.platform;
                let edgeColor = t.landed ? colors.scored : colors.main; 
                if (t.type === 'rect') {
                    ctx.fillRect(t.x, t.y, t.w, t.h);
                    ctx.beginPath(); ctx.moveTo(t.x, t.y+1); ctx.lineTo(t.x+t.w, t.y+1);
                    ctx.lineWidth = t.landed ? 3 : 2; ctx.strokeStyle = edgeColor; ctx.stroke();
                } 
                else if (t.type === 'circle') {
                    ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
                    ctx.fill(); ctx.lineWidth = t.landed ? 3 : 2; ctx.strokeStyle = edgeColor; ctx.stroke();
                } 
                else if (t.type === 'slope') {
                    ctx.save(); ctx.translate(t.x + t.w/2, t.y + t.h/2); ctx.rotate(t.angle); ctx.translate(-(t.x + t.w/2), -(t.y + t.h/2));
                    ctx.fillRect(t.x, t.y, t.w, t.h); ctx.beginPath(); ctx.moveTo(t.x, t.y+1); ctx.lineTo(t.x+t.w, t.y+1);
                    ctx.lineWidth = t.landed ? 3 : 2; ctx.strokeStyle = edgeColor; ctx.stroke(); ctx.restore();
                }
            }

            // Célzó vonal (Meleg színekhez igazítva)
            if (isDragging && gameState === STATE_PLAYING) {
                let aimX = dragStart.x - dragCurrent.x; let aimY = dragStart.y - dragCurrent.y;
                let dragX = dragCurrent.x - dragStart.x; let dragY = dragCurrent.y - dragStart.y;
                let aimLen = Math.sqrt(aimX * aimX + aimY * aimY);
                if (aimLen > maxDragDistance) {
                    aimX = (aimX / aimLen) * maxDragDistance; aimY = (aimY / aimLen) * maxDragDistance;
                    dragX = (dragX / aimLen) * maxDragDistance; dragY = (dragY / aimLen) * maxDragDistance;
                }
                ctx.beginPath(); ctx.moveTo(bike.x, bike.
