<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Végtelen Trial Bringa - Arcade Mód</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none; 
        }
        canvas {
            background-color: #f0f4f8; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            width: 100%;
            max-width: 600px;
        }
        .hud {
            display: inline-block;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 1.2rem;
            margin: 5px;
        }
        .heart { color: #e74c3c; }
        #help { font-size: 0.8rem; color: #666; display: block; margin-top: 5px; background: rgba(255,255,255,0.7); display: inline-block; padding: 2px 8px; border-radius: 10px;}
    </style>
</head>
<body>

    <div id="ui">
        <div class="hud">
            <span class="heart">❤</span> <span id="livesDisplay">3</span> | 
            Szint: <span id="scoreDisplay">0</span>
        </div>
        <br><span id="help">Minden 5. szint után bónusz élet!</span>
    </div>

    <canvas id="gameCanvas" width="600" height="900"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');

        // JÁTÉK ÁLLAPOTOK
        const STATE_PLAYING = 0;
        const STATE_CRASHED = 1;  // Fejbeverés vagy leesés, vár a kattintásra
        const STATE_GAMEOVER = 2; // Nincs több élet

        let gameState = STATE_PLAYING;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        
        let score = 0;
        let lives = 3;
        let cameraY = 0;
        let targetCameraY = 0;
        let lastCheckpoint = { x: 300, y: 800 };

        // BEÁLLÍTÁSOK
        const jumpPower = 0.045; 
        const gravity = 0.4;
        const bounceFactor = 0.4; 
        const poseStates = { GROUNDED: 0, AIRBORNE: 1, TAKING_OFF: 2 }; 

        let bike = {
            x: 300, y: 800, vx: 0, vy: 0, radius: 15, 
            angle: 0, angVel: 0, grounded: false,
            pose: poseStates.GROUNDED, tuckFactor: 0,
            dir: 1 
        };

        let terrain = [];
        let goal = { x: 0, y: 0, radius: 18 };

        function updateHUD() {
            scoreDisplay.innerText = score;
            livesDisplay.innerText = lives;
        }

        function generateChunk(startY, endY) {
            const goalPlatform = { 
                x: 100 + Math.random() * 300, 
                y: endY + 20, 
                w: 100, 
                h: 20 
            };
            terrain.push(goalPlatform);
            goal.x = goalPlatform.x + goalPlatform.w / 2;
            goal.y = goalPlatform.y - 20;

            let currentY = startY - 150;
            while(currentY > endY + 150) {
                terrain.push({
                    x: 50 + Math.random() * 400,
                    y: currentY,
                    w: 60 + Math.random() * 80,
                    h: 20 + Math.random() * 30
                });
                currentY -= (100 + Math.random() * 80);
            }
        }

        // Teljes nullázás (Game Over után)
        function initGame() {
            score = 0;
            lives = 3;
            cameraY = 0;
            targetCameraY = 0;
            terrain = [];
            updateHUD();
            
            terrain.push({ x: 0, y: 850, w: 600, h: 50 }); // Padló
            
            generateChunk(850, 150);
            lastCheckpoint = { x: 300, y: 800 };
            gameState = STATE_PLAYING;
            resetToCheckpoint();
        }

        // Vissza a Checkponthoz (Életvesztés után)
        function resetToCheckpoint() {
            bike.x = lastCheckpoint.x;
            bike.y = lastCheckpoint.y;
            bike.vx = 0;
            bike.vy = 0;
            bike.angle = 0;
            bike.angVel = 0;
            bike.pose = poseStates.GROUNDED;
            bike.grounded = true;
            bike.tuckFactor = 0;
            isDragging = false;
            // Ha leesett a kamera is alá, visszahúzzuk
            if (cameraY < targetCameraY - 500) {
                cameraY = targetCameraY;
            }
        }

        // Halál logika (fejbeverés vagy szakadék)
        function triggerCrash() {
            lives--;
            updateHUD();
            if (lives > 0) {
                gameState = STATE_CRASHED; // Freeze frame
            } else {
                gameState = STATE_GAMEOVER; // Vége
            }
            isDragging = false;
        }

        function getPointerPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY + cameraY 
            };
        }

        function startDrag(x, y) {
            // UI Kattintások kezelése halál esetén
            if (gameState === STATE_CRASHED) {
                gameState = STATE_PLAYING;
                resetToCheckpoint();
                return;
            }
            if (gameState === STATE_GAMEOVER) {
                initGame();
                return;
            }

            // Normál játékmenet
            if (bike.grounded && gameState === STATE_PLAYING) {
                isDragging = true;
                dragStart = { x, y };
                dragCurrent = { x, y };
                bike.pose = poseStates.TAKING_OFF; 
            }
        }

        function moveDrag(x, y) {
            if (isDragging && gameState === STATE_PLAYING) {
                dragCurrent = { x, y };
                const pullX = dragCurrent.x - dragStart.x;
                if (pullX < -10) bike.dir = 1; 
                else if (pullX > 10) bike.dir = -1; 
            }
        }

        function endDrag() {
            if (isDragging && gameState === STATE_PLAYING) {
                isDragging = false;
                const aimX = dragStart.x - dragCurrent.x;
                const aimY = dragStart.y - dragCurrent.y;
                
                if (Math.abs(aimX) > 5 || Math.abs(aimY) > 5) {
                    bike.vx = aimX * jumpPower;
                    bike.vy = aimY * jumpPower;
                    bike.angVel = aimX * -0.0003; 
                    
                    if (bike.angVel > 0.025) bike.angVel = 0.025;
                    if (bike.angVel < -0.025) bike.angVel = -0.025;
                    
                    bike.grounded = false;
                    bike.pose = poseStates.AIRBORNE; 
                    bike.tuckFactor = 0; 
                } else {
                    bike.pose = poseStates.GROUNDED; 
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            startDrag(pos.x, pos.y);
        });
        canvas.addEventListener('mousemove', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            moveDrag(pos.x, pos.y);
        });
        window.addEventListener('mouseup', endDrag);

        canvas.addEventListener('touchstart', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            startDrag(pos.x, pos.y);
        });
        canvas.addEventListener('touchmove', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            moveDrag(pos.x, pos.y);
        });
        window.addEventListener('touchend', endDrag);

        function updatePhysics() {
            // Finom kamera követés (mindig megy, halálkor is picit csúszik)
            cameraY += (targetCameraY - cameraY) * 0.08;

            // HA MEGHALTUNK, MEGÁLL A FIZIKA (Freeze Frame)
            if (gameState !== STATE_PLAYING) return;

            bike.vy += gravity;

            if (!bike.grounded) {
                bike.tuckFactor = Math.min(1, bike.tuckFactor + 0.05);
            }

            if (isDragging && bike.grounded) {
                const pullX = dragCurrent.x - dragStart.x;
                const pullY = dragCurrent.y - dragStart.y;
                let localPullX = pullX * bike.dir; 
                let pullLen = Math.sqrt(localPullX*localPullX + pullY*pullY);
                
                let tiltAmount = Math.min(pullLen, 150) / 150; 
                let targetAngle = -0.5 * tiltAmount * bike.dir; 
                
                bike.angle += (targetAngle - bike.angle) * 0.15;
            }

            bike.x += bike.vx;
            bike.y += bike.vy;
            bike.angle += bike.angVel;

            while (bike.angle > Math.PI) bike.angle -= Math.PI * 2;
            while (bike.angle < -Math.PI) bike.angle += Math.PI * 2;

            // --- FEJ ÜTKÖZÉS (HALÁL) ---
            let headRx = 10 * bike.dir; 
            let headRy = -55;
            let headWx = bike.x + Math.cos(bike.angle)*headRx - Math.sin(bike.angle)*headRy;
            let headWy = bike.y + Math.sin(bike.angle)*headRx + Math.cos(bike.angle)*headRy;
            
            for (let t of terrain) {
                let closestX = Math.max(t.x, Math.min(headWx, t.x + t.w));
                let closestY = Math.max(t.y, Math.min(headWy, t.y + t.h));
                let dx = headWx - closestX;
                let dy = headWy - closestY;
                if (Math.sqrt(dx*dx + dy*dy) < 12) { 
                    triggerCrash(); // MEGFIZETETT HIBÁZÁS
                    return; 
                }
            }

            let hitGroundThisFrame = false;

            const collisionPoints = [
                { rx: -25 * bike.dir, ry: 10, radius: 12 }, 
                { rx: 30 * bike.dir,  ry: 10, radius: 12 }, 
                { rx: 0,              ry: 0,  radius: 10 }  
            ];

            for (let p of collisionPoints) {
                let wx = bike.x + Math.cos(bike.angle)*p.rx - Math.sin(bike.angle)*p.ry;
                let wy = bike.y + Math.sin(bike.angle)*p.rx + Math.cos(bike.angle)*p.ry;

                if (wx - p.radius < 0) { 
                    bike.x += Math.abs(wx - p.radius);
                    bike.vx = Math.abs(bike.vx) * bounceFactor;
                    bike.angVel *= -0.3;
                    wx = p.radius; 
                }
                if (wx + p.radius > canvas.width) { 
                    bike.x -= Math.abs((wx + p.radius) - canvas.width);
                    bike.vx = -Math.abs(bike.vx) * bounceFactor;
                    bike.angVel *= -0.3;
                    wx = canvas.width - p.radius;
                }

                for (let t of terrain) {
                    let closestX = Math.max(t.x, Math.min(wx, t.x + t.w));
                    let closestY = Math.max(t.y, Math.min(wy, t.y + t.h));

                    let dx = wx - closestX;
                    let dy = wy - closestY;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < p.radius) {
                        let nx = dx / distance;
                        let ny = dy / distance;
                        let penetration = p.radius - distance;

                        bike.x += nx * penetration;
                        bike.y += ny * penetration;

                        if (Math.abs(ny) > Math.abs(nx)) {
                            if (ny < 0) { 
                                bike.vy = 0; bike.vx = 0; bike.angVel = 0;
                                hitGroundThisFrame = true;
                                bike.pose = poseStates.GROUNDED; 
                            } else { 
                                bike.vy = Math.abs(bike.vy) * 0.5;
                            }
                        } else { 
                            bike.vx = -bike.vx * bounceFactor;
                            bike.angVel *= -0.3; 
                        }
                    }
                }
            }

            bike.grounded = hitGroundThisFrame;

            if (bike.grounded && !isDragging) {
                if (bike.angle * bike.dir > 0) {
                    let targetAngle = -0.1 * bike.dir; 
                    bike.angle += (targetAngle - bike.angle) * 0.1;
                }
                bike.tuckFactor = Math.max(0, bike.tuckFactor - 0.1); 
            }
            
            // --- CHECKPOINT / SZINTLÉPÉS LOGIKA ---
            let distToGoal = Math.sqrt(Math.pow(bike.x - goal.x, 2) + Math.pow(bike.y - goal.y, 2));
            if (distToGoal < bike.radius + goal.radius) {
                score++;
                
                // +1 Élet minden 5. pályán!
                if (score % 5 === 0) {
                    lives++;
                }
                updateHUD();
                
                lastCheckpoint = { x: goal.x, y: goal.y - 20 };
                let newEndY = goal.y - 800; 
                generateChunk(goal.y, newEndY);
                targetCameraY = goal.y - 750;
                terrain = terrain.filter(t => t.y < cameraY + 1500);
            }

            // Leesés halál (Ha kiesel a képből lefelé)
            if (bike.y > cameraY + canvas.height + 50) {
                triggerCrash();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(0, -cameraY);

            ctx.fillStyle = "#88929b";
            ctx.fillRect(0, cameraY - 100, 15, canvas.height + 200); 
            ctx.fillRect(canvas.width - 15, cameraY - 100, 15, canvas.height + 200); 

            ctx.fillStyle = "#4a5568";
            for (let t of terrain) ctx.fillRect(t.x, t.y, t.w, t.h);

            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#FFD700"; 
            ctx.fill();
            ctx.strokeStyle = "#B8860B";
            ctx.lineWidth = 4;
            ctx.stroke();

            if (isDragging && gameState === STATE_PLAYING) {
                const aimX = dragStart.x - dragCurrent.x;
                const aimY = dragStart.y - dragCurrent.y;
                const pullX = dragCurrent.x - dragStart.x;
                const pullY = dragCurrent.y - dragStart.y;

                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + aimX, bike.y + aimY);
                ctx.strokeStyle = "rgba(0, 150, 0, 0.6)";
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + pullX, bike.y + pullY);
                ctx.strokeStyle = "rgba(255, 0, 0, 0.6)";
                ctx.lineWidth = 4;
                ctx.setLineDash([]);
                ctx.stroke();
            }

            // --- BRINGA ---
            ctx.save();
            ctx.translate(bike.x, bike.y);
            ctx.rotate(bike.angle);
            ctx.scale(bike.dir, 1); 

            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            ctx.strokeStyle = "#222";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(-25, 10, 12, 0, Math.PI * 2); 
            ctx.moveTo(42, 10);
            ctx.arc(30, 10, 12, 0, Math.PI * 2);  
            ctx.stroke();

            ctx.strokeStyle = "#111";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-25, 10); 
            ctx.lineTo(0, 10);   
            ctx.lineTo(20, -15); 
            ctx.lineTo(25, 10);  
            ctx.moveTo(20, -15); 
            ctx.lineTo(-10, 0);  
            ctx.lineTo(-25, 10); 
            ctx.moveTo(-10, 0);  
            ctx.lineTo(0, 10);   
            ctx.moveTo(-8, 14);
            ctx.lineTo(8, 14);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(20, -15);
            ctx.lineTo(18, -20); 
            ctx.lineTo(22, -22); 
            ctx.stroke();

            // --- ARIFER ---
            ctx.beginPath();
            // Pirosra vált a ruhája, ha beveri a fejét!
            ctx.strokeStyle = gameState !== STATE_PLAYING ? "#e74c3c" : "#1a73e8"; 
            ctx.lineWidth = 4; 
            
            const hands = { x: 20, y: -22 };  
            const pedals = { x: 0, y: 10 };   
            
            let butt = { x: -12, y: -22 };   
            let shoulder = { x: 5, y: -45 }; 
            let head = { x: 10, y: -55 };     

            if (isDragging && gameState === STATE_PLAYING) {
                const pullX = dragCurrent.x - dragStart.x;
                const pullY = dragCurrent.y - dragStart.y;
                const localPullX = pullX * bike.dir;
                
                let pullLen = Math.sqrt(localPullX*localPullX + pullY*pullY);
                let moveX = 0, moveY = 0;
                
                if (pullLen > 0) {
                    moveX = (localPullX / pullLen) * Math.min(pullLen * 0.15, 20);
                    moveY = (pullY / pullLen) * Math.min(pullLen * 0.15, 20);
                }

                butt.x += moveX * 0.8;
                butt.y += moveY * 0.8;
                shoulder.x += moveX;
                shoulder.y += moveY;
                head.x += moveX;
                head.y += moveY;

            } else if (!bike.grounded && bike.pose === poseStates.AIRBORNE) {
                butt.x += 10 * bike.tuckFactor;
                butt.y += 8 * bike.tuckFactor;
                shoulder.x += 12 * bike.tuckFactor;
                shoulder.y += 10 * bike.tuckFactor;
                head.x += 12 * bike.tuckFactor;
                head.y += 10 * bike.tuckFactor;
            }

            ctx.moveTo(butt.x, butt.y); 
            ctx.lineTo(shoulder.x, shoulder.y); 
            
            let armMx = (shoulder.x + hands.x) / 2 - 5;
            let armMy = (shoulder.y + hands.y) / 2 - 8;
            ctx.moveTo(shoulder.x, shoulder.y);
            ctx.lineTo(armMx, armMy);
            ctx.lineTo(hands.x, hands.y);
            
            let legMx = (butt.x + pedals.x) / 2 + 12;
            let legMy = (butt.y + pedals.y) / 2 - 4;
            ctx.moveTo(butt.x, butt.y);
            ctx.lineTo(legMx, legMy);
            ctx.lineTo(pedals.x, pedals.y);
            
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(head.x, head.y, 8, 0, Math.PI * 2); 
            ctx.fillStyle = gameState !== STATE_PLAYING ? "#e74c3c" : "#1a73e8";
            ctx.fill();
            ctx.stroke();

            ctx.restore();
            ctx.restore(); // Kamera visszaállítása

            // --- UI OVERLAY (Halál és Game Over szövegek) ---
            if (gameState === STATE_CRASHED) {
                ctx.fillStyle = "rgba(231, 76, 60, 0.3)"; // Halvány piros
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 40px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("BUKTÁL!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px sans-serif";
                ctx.fillText("Kattints a folytatáshoz (-1 élet)", canvas.width / 2, canvas.height / 2 + 20);
            } else if (gameState === STATE_GAMEOVER) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; // Sötét fekete
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 50px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);
                ctx.font = "24px sans-serif";
                ctx.fillStyle = "#f1c40f";
                ctx.fillText(`Elért Szint: ${score}`, canvas.width / 2, canvas.height / 2 + 10);
                ctx.fillStyle = "#fff";
                ctx.font = "20px sans-serif";
                ctx.fillText("Kattints az újrakezdéshez!", canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>
