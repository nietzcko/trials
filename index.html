<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Trial - Vertical Survival</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --platform-body: #171d25;
            --neon-main: #00f3ff;
            --neon-alt: #ff0055;
            --neon-scored: #ffd700;
            --text-color: #c5c6c7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color); 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none; 
            color: var(--text-color);
        }

        canvas {
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            max-width: 100vw;
            max-height: 100vh;
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: crosshair;
        }

        #ui-top {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            width: 100%;
            text-align: center;
        }

        .hud {
            display: inline-block;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.9); 
            color: #fff;
        }

        .score-num { 
            color: var(--neon-scored); 
            font-size: 2rem; 
            text-shadow: 0 0 15px var(--neon-scored), 0 4px 10px rgba(0,0,0,0.9); 
        }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="hud">
            SCORE: <span id="scoreDisplay" class="score-num">0</span>
        </div>
    </div>

    <canvas id="gameCanvas" width="540" height="960"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');

        const STATE_PLAYING = 0;
        const STATE_GAMEOVER = 1; 

        let gameState = STATE_PLAYING;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        
        const maxDragDistance = 220;
        let score = 0;
        
        let cameraX = 0, targetCameraX = 0;
        let cameraY = 0, targetCameraY = 0;
        let bgPulse = 0; 
        let genX = 0, genY = 600;

        const colors = {
            main: '#00f3ff',
            alt: '#ff0055',
            scored: '#ffd700',
            platform: '#171d25',
            bg: '#0b0c10'
        };

        const jumpPower = 0.045; 
        const gravity = 0.4;
        const bounceFactor = 0.4; 
        const rotLimit = 0.8; 

        let bike = {
            x: 150, y: 500, vx: 0, vy: 0, radius: 15, 
            angle: 0, angVel: 0, grounded: false, tuckFactor: 0, dir: 1 
        };

        let terrain = [];

        function updateHUD() {
            scoreDisplay.innerText = score;
        }

        function generateObstacle() {
            let gapX = 80 + Math.random() * 90; 
            let startX = genX + gapX;
            let type = Math.floor(Math.random() * 6); 
            
            if (genY < 300) type = Math.max(type, 3); 
            if (genY > 750) type = Math.min(type, 2); 

            if (type === 0) { 
                let w = 40 + Math.random() * 80; 
                let y = genY + (Math.random() * 200 - 100);
                terrain.push({type: 'rect', x: startX, y: y, w: w, h: 40, landed: false});
                genX = startX + w; genY = y;
            } 
            else if (type === 1) { 
                let r = 25 + Math.random() * 20; 
                let y = genY + (Math.random() * 150 - 75);
                terrain.push({type: 'circle', x: startX + r, y: y, r: r, landed: false});
                genX = startX + r * 2; genY = y - r; 
            } 
            else { 
                let w = 80 + Math.random() * 40;
                let y = genY + (Math.random() * 160 - 80);
                terrain.push({type: 'rect', x: startX, y: y, w: w, h: 40, landed: false});
                genX = startX + w; genY = y;
            }
        }

        function initGame() {
            score = 0; terrain = []; updateHUD();
            
            // KEZDŐPADLÓ - Ez akadályozza meg a leesést az elején
            genX = 0; genY = 600;
            terrain.push({ type: 'rect', x: -200, y: 600, w: 1800, h: 200, landed: true }); 
            
            // Tutorial platformok
            terrain.push({ type: 'rect', x: 500, y: 520, w: 150, h: 35, landed: false });
            terrain.push({ type: 'rect', x: 850, y: 440, w: 150, h: 35, landed: false });

            genX = 1600; genY = 600;
            for(let i=0; i<10; i++) generateObstacle();
            
            bike = { x: 150, y: 550, vx: 0, vy: 0, radius: 15, angle: 0, angVel: 0, grounded: true, tuckFactor: 0, dir: 1 };
            
            cameraX = bike.x - 120; cameraY = bike.y - 650;
            gameState = STATE_PLAYING;
        }

        function getPointerPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX + cameraX,
                y: (clientY - rect.top) * scaleY + cameraY 
            };
        }

        function startDrag(x, y) {
            if (gameState === STATE_GAMEOVER) { initGame(); return; }
            if (bike.grounded && gameState === STATE_PLAYING) {
                isDragging = true;
                dragStart = { x, y }; dragCurrent = { x, y };
            }
        }

        function endDrag() {
            if (isDragging && gameState === STATE_PLAYING) {
                isDragging = false;
                let dx = dragStart.x - dragCurrent.x;
                let dy = dragStart.y - dragCurrent.y;
                let len = Math.sqrt(dx * dx + dy * dy);

                if (len > 5) {
                    if (len > maxDragDistance) {
                        dx = (dx / len) * maxDragDistance;
                        dy = (dy / len) * maxDragDistance;
                    }
                    bike.vx = dx * jumpPower;
                    bike.vy = dy * jumpPower;
                    bike.angVel = dx * -0.00015; 
                    bike.grounded = false;
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => startDrag(...Object.values(getPointerPos(e.clientX, e.clientY))));
        canvas.addEventListener('mousemove', (e) => { if(isDragging) dragCurrent = getPointerPos(e.clientX, e.clientY); });
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', (e) => startDrag(...Object.values(getPointerPos(e.touches[0].clientX, e.touches[0].clientY))));
        canvas.addEventListener('touchmove', (e) => { if(isDragging) dragCurrent = getPointerPos(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchend', endDrag);

        function checkCollision(px, py, r, t) {
            if (t.type === 'circle') {
                let dx = px - t.x, dy = py - t.y, d = Math.sqrt(dx*dx + dy*dy);
                if (d < r + t.r) return { hit: true, nx: dx/d, ny: dy/d, pen: (r + t.r) - d };
            } else {
                let cx = Math.max(t.x, Math.min(px, t.x + t.w));
                let cy = Math.max(t.y, Math.min(py, t.y + t.h));
                let dx = px - cx, dy = py - cy, d = Math.sqrt(dx*dx + dy*dy);
                if (d < r) return { hit: true, nx: d===0?0:dx/d, ny: d===0?-1:dy/d, pen: r - d };
            }
            return { hit: false };
        }

        function updatePhysics() {
            if (gameState !== STATE_PLAYING) return;
            bike.vy += gravity;

            if (!bike.grounded) {
                bike.angVel *= 0.98;
                bike.tuckFactor = Math.min(1, bike.tuckFactor + 0.1);
            } else {
                bike.tuckFactor = Math.max(0, bike.tuckFactor - 0.2);
                if (isDragging) {
                    let tilt = Math.max(-0.6, Math.min(0.6, (dragCurrent.x - dragStart.x) / maxDragDistance));
                    bike.angle += (tilt - bike.angle) * 0.15;
                }
            }

            bike.x += bike.vx; bike.y += bike.vy; bike.angle += bike.angVel;
            if (bike.angle > rotLimit) { bike.angle = rotLimit; bike.angVel = 0; }
            if (bike.angle < -rotLimit) { bike.angle = -rotLimit; bike.angVel = 0; }

            if (bike.x > genX - 1200) generateObstacle();

            let groundedThisFrame = false;
            const pts = [{dx: -25, dy: 10}, {dx: 30, dy: 10}, {dx: 0, dy: 0}];
            pts.forEach(p => {
                let wx = bike.x + Math.cos(bike.angle)*p.dx - Math.sin(bike.angle)*p.dy;
                let wy = bike.y + Math.sin(bike.angle)*p.dx + Math.cos(bike.angle)*p.dy;
                terrain.forEach(t => {
                    let c = checkCollision(wx, wy, 12, t);
                    if (c.hit) {
                        bike.x += c.nx * c.pen; bike.y += c.ny * c.pen;
                        if (c.ny < -0.5) {
                            bike.vy = 0; bike.vx = 0; bike.angVel = 0; groundedThisFrame = true;
                            if (!t.landed) { t.landed = true; score++; updateHUD(); }
                        } else { bike.vx *= -0.3; }
                    }
                });
            });

            // Head death
            let hx = bike.x + Math.cos(bike.angle)*10 - Math.sin(bike.angle)*-55;
            let hy = bike.y + Math.sin(bike.angle)*10 + Math.cos(bike.angle)*-55;
            terrain.forEach(t => { if(checkCollision(hx, hy, 12, t).hit) gameState = STATE_GAMEOVER; });

            bike.grounded = groundedThisFrame;
            if (bike.y > cameraY + 1400) gameState = STATE_GAMEOVER;

            cameraX += (bike.x - 150 - cameraX) * 0.08;
            cameraY += (bike.y - 600 - cameraY) * 0.08;
        }

        function draw() {
            ctx.fillStyle = colors.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save(); ctx.translate(-cameraX, -cameraY);
            terrain.forEach(t => {
                ctx.fillStyle = colors.platform;
                let edge = t.landed ? colors.scored : colors.main;
                ctx.strokeStyle = edge; ctx.lineWidth = 3;
                if (t.type === 'rect') {
                    ctx.fillRect(t.x, t.y, t.w, t.h);
                    ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.x + t.w, t.y); ctx.stroke();
                } else {
                    ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, 7); ctx.fill(); ctx.stroke();
                }
            });

            // Slingshot
            if (isDragging && bike.grounded) {
                ctx.setLineDash([5, 5]); ctx.strokeStyle = colors.main;
                ctx.beginPath(); ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + (dragStart.x - dragCurrent.x), bike.y + (dragStart.y - dragCurrent.y));
                ctx.stroke(); ctx.setLineDash([]);
            }

            // Bike
            ctx.save(); ctx.translate(bike.x, bike.y); ctx.rotate(bike.angle);
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(-25, 10, 12, 0, 7); ctx.stroke(); // Wheels
            ctx.beginPath(); ctx.arc(30, 10, 12, 0, 7); ctx.stroke();
            ctx.strokeStyle = "#444"; // Frame
            ctx.beginPath(); ctx.moveTo(-25, 10); ctx.lineTo(0, 10); ctx.lineTo(20, -15); ctx.lineTo(30, 10); ctx.lineTo(20, -15); ctx.lineTo(-10, 0); ctx.lineTo(-25, 10); ctx.stroke();
            
            // Rider
            let dx = isDragging ? (dragCurrent.x - dragStart.x) : 0;
            let dy = isDragging ? (dragCurrent.y - dragStart.y) : 0;
            let butt = { x: -12 + (bike.tuckFactor * 8) + (dx/maxDragDistance*15), y: -22 + (bike.tuckFactor * 5) - (dy/maxDragDistance*10) };
            let shoulder = { x: 5 + (bike.tuckFactor * 10) + (dx/maxDragDistance*10), y: -45 + (bike.tuckFactor * 10) - (dy/maxDragDistance*5) };
            ctx.strokeStyle = colors.main; ctx.shadowBlur = 10; ctx.shadowColor = colors.main;
            ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(butt.x, butt.y); ctx.lineTo(shoulder.x, shoulder.y); ctx.lineTo(20, -15); ctx.stroke();
            ctx.beginPath(); ctx.arc(shoulder.x + 5, shoulder.y - 10, 8, 0, 7); ctx.fillStyle = colors.main; ctx.fill();
            ctx.restore(); ctx.restore();

            if (gameState === STATE_GAMEOVER) {
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = colors.alt; ctx.font = "bold 50px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("CRASHED", canvas.width/2, canvas.height/2);
            }
        }

        function loop() { updatePhysics(); draw(); requestAnimationFrame(loop); }
        initGame(); loop();
    </script>
</body>
</html>
