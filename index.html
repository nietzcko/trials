<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vonalrajzos Trial Bringa - Fizika Javítva</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none; 
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            cursor: crosshair;
        }
        #instructions {
            position: absolute;
            top: 20px;
            text-align: center;
            color: #555;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 10px;
        }
        h2 { margin: 5px 0; font-size: 1.2rem; }
        p { margin: 5px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="instructions">
        <h2>Trial Bringa</h2>
        <p>Húzd hátra a gumit (piros), és célozd be a sárga karikát (zöld)!</p>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Játékállapot
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        let dragDistance = 0; 
        let levelWon = false;

        // BEÁLLÍTÁSOK
        const jumpPower = 0.08; 
        const gravity = 0.4;
        const bounceFactor = 0.6; 
        const poseStates = { GROUNDED: 0, AIRBORNE: 1, TAKING_OFF: 2 }; 

        // Bringa objektum
        let bike = {
            x: 100, y: 400, vx: 0, vy: 0, radius: 20, 
            angle: 0, angVel: 0, grounded: false,
            pose: poseStates.GROUNDED, tuckFactor: 0 
        };

        let terrain = [];
        let goal = { x: 0, y: 0, radius: 15 };

        // Pályagenerátor
        function generateLevel() {
            levelWon = false;
            terrain = [];
            
            terrain.push({ x: 0, y: 550, w: 800, h: 50 }); // Padló
            terrain.push({ x: -50, y: 0, w: 50, h: 600 }); // Bal fal
            terrain.push({ x: 800, y: 0, w: 50, h: 600 }); // Jobb fal
            terrain.push({ x: 50, y: 450, w: 150, h: 100 }); // Kezdő platform

            const goalPlatform = { 
                x: 600 + Math.random() * 100, 
                y: 100 + Math.random() * 150, 
                w: 80 + Math.random() * 40, 
                h: 20 
            };
            terrain.push(goalPlatform);

            goal.x = goalPlatform.x + goalPlatform.w / 2;
            goal.y = goalPlatform.y - 20;

            for(let i = 0; i < 5; i++) {
                terrain.push({
                    x: 250 + Math.random() * 300,
                    y: 200 + Math.random() * 250,
                    w: 40 + Math.random() * 80,
                    h: 20 + Math.random() * 50
                });
            }

            bike.x = 100; bike.y = 400; bike.vx = 0; bike.vy = 0; 
            bike.angle = 0; bike.angVel = 0; bike.grounded = true; 
            bike.pose = poseStates.GROUNDED; isDragging = false;
        }

        function getPointerPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDrag(x, y) {
            if (levelWon) {
                generateLevel(); 
                return;
            }
            if (bike.grounded) {
                isDragging = true;
                dragStart = { x, y };
                dragCurrent = { x, y };
                bike.pose = poseStates.TAKING_OFF; 
            }
        }

        function moveDrag(x, y) {
            if (isDragging) {
                dragCurrent = { x, y };
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                dragDistance = Math.sqrt(dx * dx + dy * dy); 
            }
        }

        function endDrag() {
            if (isDragging) {
                isDragging = false;
                
                const aimX = dragStart.x - dragCurrent.x;
                const aimY = dragStart.y - dragCurrent.y;
                
                if (Math.abs(aimX) > 5 || Math.abs(aimY) > 5) {
                    bike.vx = aimX * jumpPower;
                    bike.vy = aimY * jumpPower;
                    
                    if (aimX > 0) {
                      bike.angVel = -0.005 - (dragDistance * 0.0001); 
                    } else {
                      bike.angVel = 0.005 + (dragDistance * 0.0001); 
                    }
                    
                    bike.grounded = false;
                    bike.pose = poseStates.AIRBORNE; 
                    bike.tuckFactor = 0; 
                } else {
                    bike.pose = poseStates.GROUNDED; 
                }
                dragDistance = 0;
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            startDrag(pos.x, pos.y);
        });
        canvas.addEventListener('mousemove', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            moveDrag(pos.x, pos.y);
        });
        window.addEventListener('mouseup', endDrag);

        canvas.addEventListener('touchstart', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            startDrag(pos.x, pos.y);
        });
        canvas.addEventListener('touchmove', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            moveDrag(pos.x, pos.y);
        });
        window.addEventListener('touchend', endDrag);

        function updatePhysics() {
            if (levelWon) return; 

            if (!bike.grounded) {
                bike.vy += gravity;
                bike.x += bike.vx;
                bike.y += bike.vy;
                bike.angle += bike.angVel;
                
                // Repülés közbeni összehúzódás
                bike.tuckFactor = Math.min(1, bike.tuckFactor + 0.05);

                let hitGroundThisFrame = false;

                for (let t of terrain) {
                    let closestX = Math.max(t.x, Math.min(bike.x, t.x + t.w));
                    let closestY = Math.max(t.y, Math.min(bike.y, t.y + t.h));

                    let dx = bike.x - closestX;
                    let dy = bike.y - closestY;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < bike.radius) {
                        let nx = dx / distance;
                        let ny = dy / distance;

                        bike.x = closestX + nx * bike.radius;
                        bike.y = closestY + ny * bike.radius;

                        if (Math.abs(ny) > Math.abs(nx)) {
                            if (ny < 0) { 
                                bike.vy = 0; bike.vx = 0; bike.angVel = 0;
                                hitGroundThisFrame = true;
                                bike.pose = poseStates.GROUNDED; 
                            } else {
                                bike.vy = Math.abs(bike.vy) * 0.5;
                            }
                        } else {
                            bike.vx = -bike.vx * bounceFactor;
                            bike.angVel *= -0.8; 
                        }
                    }
                }

                if (hitGroundThisFrame) bike.grounded = true;
            } else {
                // Földet érés utáni lassú egyenesedés
                bike.angle += (0 - bike.angle) * 0.1;
                bike.tuckFactor = Math.max(0, bike.tuckFactor - 0.1); 
                if (Math.abs(bike.angle) < 0.01) bike.angle = 0;
            }
            
            // Cél ellenőrzése
            let distToGoal = Math.sqrt(Math.pow(bike.x - goal.x, 2) + Math.pow(bike.y - goal.y, 2));
            if (distToGoal < bike.radius + goal.radius) levelWon = true;

            // Halál zóna
            if (bike.y > canvas.height + 100) {
                bike.x = 100; bike.y = 400; bike.vx = 0; bike.vy = 0; bike.angle = 0; bike.pose = poseStates.GROUNDED;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Pálya
            ctx.fillStyle = "#666";
            for (let t of terrain) ctx.fillRect(t.x, t.y, t.w, t.h);

            // Cél
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#FFD700"; 
            ctx.fill();
            ctx.strokeStyle = "#B8860B";
            ctx.lineWidth = 3;
            ctx.stroke();

            // Célzó vonalak
            if (isDragging) {
                const aimX = dragStart.x - dragCurrent.x;
                const aimY = dragStart.y - dragCurrent.y;
                const pullX = dragCurrent.x - dragStart.x;
                const pullY = dragCurrent.y - dragStart.y;

                // Zöld szaggatott: Ugrás iránya (Röppálya)
                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + aimX, bike.y + aimY);
                ctx.strokeStyle = "rgba(0, 150, 0, 0.5)";
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                
                // Piros folytonos: Csúzli gumi (Húzás iránya)
                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + pullX, bike.y + pullY);
                ctx.strokeStyle = "rgba(255, 0, 0, 0.5)";
                ctx.lineWidth = 3;
                ctx.setLineDash([]);
                ctx.stroke();
            }

            // Bringa rajzolás
            ctx.save();
            ctx.translate(bike.x, bike.y);
            ctx.rotate(bike.angle);

            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            // Kerekek és váz
            ctx.beginPath();
            ctx.arc(-20, 10, 10, 0, Math.PI * 2); 
            ctx.moveTo(30, 10);
            ctx.arc(20, 10, 10, 0, Math.PI * 2);  
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-20, 10); ctx.lineTo(0, 10); ctx.lineTo(15, -10); 
            ctx.lineTo(20, 10); ctx.moveTo(0, 10); ctx.lineTo(-5, -10); 
            ctx.lineTo(-20, 10); ctx.stroke();

            // --- Arifer (Bringás) ---
            ctx.beginPath();
            ctx.strokeStyle = "#1a73e8"; 
            
            // Fix pontok a bringán
            const hands = { x: 15, y: -10 };  
            const pedals = { x: 0, y: 10 };   
            
            // Mozgó pontok
            let butt = { x: -5, y: -10 };   
            let shoulder = { x: 5, y: -25 }; 
            let head = { x: 8, y: -32 };     

            if (isDragging) {
                // A súlypont a húzás (pull) irányába mozdul
                const pullX = dragCurrent.x - dragStart.x;
                const pullY = dragCurrent.y - dragStart.y;
                
                let pullLen = Math.sqrt(pullX*pullX + pullY*pullY);
                let moveX = 0, moveY = 0;
                
                // Maximalizáljuk a mozgást, hogy ne törjön el a karakter (Crouch limit)
                if (pullLen > 0) {
                    moveX = (pullX / pullLen) * Math.min(pullLen * 0.1, 15);
                    moveY = (pullY / pullLen) * Math.min(pullLen * 0.1, 15);
                }

                butt.x += moveX;
                butt.y += moveY;
                shoulder.x += moveX * 0.8;
                shoulder.y += moveY * 0.8;
                head.x += moveX * 0.8;
                head.y += moveY * 0.8;

            } else if (!bike.grounded && bike.pose === poseStates.AIRBORNE) {
                // Levegőben a test a kormány felé húzódik (Tuck)
                butt.x += 8 * bike.tuckFactor;
                butt.y += 5 * bike.tuckFactor;
                shoulder.x += 10 * bike.tuckFactor;
                shoulder.y += 8 * bike.tuckFactor;
                head.x += 10 * bike.tuckFactor;
                head.y += 8 * bike.tuckFactor;
            }

            // Testvonal rajzolása (Térddel és Könyökkel)
            ctx.moveTo(butt.x, butt.y); 
            ctx.lineTo(shoulder.x, shoulder.y); // Gerinc
            
            // Kéz könyökkel (hátra és felfelé hajlik)
            let armMx = (shoulder.x + hands.x) / 2 - 5;
            let armMy = (shoulder.y + hands.y) / 2 - 5;
            ctx.moveTo(shoulder.x, shoulder.y);
            ctx.lineTo(armMx, armMy);
            ctx.lineTo(hands.x, hands.y);
            
            // Láb térddel (előre hajlik)
            let legMx = (butt.x + pedals.x) / 2 + 6;
            let legMy = (butt.y + pedals.y) / 2 - 2;
            ctx.moveTo(butt.x, butt.y);
            ctx.lineTo(legMx, legMy);
            ctx.lineTo(pedals.x, pedals.y);
            
            ctx.stroke();

            // Fej
            ctx.beginPath();
            ctx.arc(head.x, head.y, 5, 0, Math.PI * 2);
            ctx.stroke();

            ctx.restore();

            // Győzelmi felirat
            if (levelWon) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 40px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("CÉLBA ÉRTÉL!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px sans-serif";
                ctx.fillText("Kattints bárhova a következő pályához!", canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        generateLevel();
        gameLoop();
    </script>
</body>
</html>
