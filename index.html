<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vonalrajzos Trial Bringa - Tükröződés és Game Over</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none; 
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            cursor: crosshair;
        }
        #instructions {
            position: absolute;
            top: 20px;
            text-align: center;
            color: #555;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 10px;
        }
        h2 { margin: 5px 0; font-size: 1.2rem; }
        p { margin: 5px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="instructions">
        <h2>Trial Bringa</h2>
        <p>Vigyázz a fejedre! Húzd hátra a gumit az ugráshoz.</p>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        let levelWon = false;

        const jumpPower = 0.045; 
        const gravity = 0.4;
        const bounceFactor = 0.5; 
        const poseStates = { GROUNDED: 0, AIRBORNE: 1, TAKING_OFF: 2 }; 

        // Bringa objektum új "dir" (irány) tulajdonsággal (1: Jobb, -1: Bal)
        let bike = {
            x: 100, y: 400, vx: 0, vy: 0, radius: 15, 
            angle: 0, angVel: 0, grounded: false,
            pose: poseStates.GROUNDED, tuckFactor: 0,
            dir: 1 
        };

        let terrain = [];
        let goal = { x: 0, y: 0, radius: 15 };

        function resetBike() {
            bike.x = 100;
            bike.y = 400;
            bike.vx = 0;
            bike.vy = 0;
            bike.angle = 0;
            bike.angVel = 0;
            bike.pose = poseStates.GROUNDED;
            bike.grounded = true;
            bike.tuckFactor = 0;
            bike.dir = 1;
            isDragging = false;
        }

        function generateLevel() {
            levelWon = false;
            terrain = [];
            
            terrain.push({ x: 0, y: 550, w: 800, h: 50 }); // Padló
            terrain.push({ x: -50, y: 0, w: 50, h: 600 }); // Bal fal
            terrain.push({ x: 800, y: 0, w: 50, h: 600 }); // Jobb fal
            terrain.push({ x: 50, y: 450, w: 150, h: 100 }); // Kezdő platform

            const goalPlatform = { 
                x: 600 + Math.random() * 100, 
                y: 100 + Math.random() * 150, 
                w: 80 + Math.random() * 40, 
                h: 20 
            };
            terrain.push(goalPlatform);

            goal.x = goalPlatform.x + goalPlatform.w / 2;
            goal.y = goalPlatform.y - 20;

            for(let i = 0; i < 6; i++) {
                terrain.push({
                    x: 200 + Math.random() * 350,
                    y: 200 + Math.random() * 250,
                    w: 40 + Math.random() * 80,
                    h: 20 + Math.random() * 50
                });
            }

            resetBike();
        }

        function getPointerPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDrag(x, y) {
            if (levelWon) {
                generateLevel(); 
                return;
            }
            if (bike.grounded) {
                isDragging = true;
                dragStart = { x, y };
                dragCurrent = { x, y };
                bike.pose = poseStates.TAKING_OFF; 
            }
        }

        function moveDrag(x, y) {
            if (isDragging) {
                dragCurrent = { x, y };
                
                // Tükröződés: Melyik irányba húzzuk a csúzlit?
                const pullX = dragCurrent.x - dragStart.x;
                if (pullX < -5) bike.dir = 1; // Jobbra akarunk ugrani
                else if (pullX > 5) bike.dir = -1; // Balra akarunk ugrani
            }
        }

        function endDrag() {
            if (isDragging) {
                isDragging = false;
                
                const aimX = dragStart.x - dragCurrent.x;
                const aimY = dragStart.y - dragCurrent.y;
                
                if (Math.abs(aimX) > 5 || Math.abs(aimY) > 5) {
                    bike.vx = aimX * jumpPower;
                    bike.vy = aimY * jumpPower;
                    
                    // Lassabb forgás: -0.001 helyett -0.0003
                    bike.angVel = aimX * -0.0003; 
                    
                    // Szigorúbb limit a forgásra, hogy ne szaltózzon egykönnyen
                    if (bike.angVel > 0.025) bike.angVel = 0.025;
                    if (bike.angVel < -0.025) bike.angVel = -0.025;
                    
                    bike.grounded = false;
                    bike.pose = poseStates.AIRBORNE; 
                    bike.tuckFactor = 0; 
                } else {
                    bike.pose = poseStates.GROUNDED; 
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            startDrag(pos.x, pos.y);
        });
        canvas.addEventListener('mousemove', (e) => {
            const pos = getPointerPos(e.clientX, e.clientY);
            moveDrag(pos.x, pos.y);
        });
        window.addEventListener('mouseup', endDrag);

        canvas.addEventListener('touchstart', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            startDrag(pos.x, pos.y);
        });
        canvas.addEventListener('touchmove', (e) => {
            const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY);
            moveDrag(pos.x, pos.y);
        });
        window.addEventListener('touchend', endDrag);

        function updatePhysics() {
            if (levelWon) return; 

            bike.vy += gravity;

            if (!bike.grounded) {
                bike.tuckFactor = Math.min(1, bike.tuckFactor + 0.05);
            }

            bike.x += bike.vx;
            bike.y += bike.vy;
            bike.angle += bike.angVel;

            while (bike.angle > Math.PI) bike.angle -= Math.PI * 2;
            while (bike.angle < -Math.PI) bike.angle += Math.PI * 2;

            // --- FEJ ÜTKÖZÉS (GAME OVER) ---
            let headRx = 5 * bike.dir; 
            let headRy = -30;
            // Abszolút pozíció kiszámítása a dőlésszög alapján
            let headWx = bike.x + Math.cos(bike.angle)*headRx - Math.sin(bike.angle)*headRy;
            let headWy = bike.y + Math.sin(bike.angle)*headRx + Math.cos(bike.angle)*headRy;
            
            for (let t of terrain) {
                let closestX = Math.max(t.x, Math.min(headWx, t.x + t.w));
                let closestY = Math.max(t.y, Math.min(headWy, t.y + t.h));
                let dx = headWx - closestX;
                let dy = headWy - closestY;
                
                // Ha a fej 8 pixeles sugarában van a fal, akkor vége
                if (Math.sqrt(dx*dx + dy*dy) < 8) {
                    resetBike();
                    return; // Azonnali kilépés a fizika frissítésből
                }
            }

            // --- KEREKEK ÜTKÖZÉSE ---
            let hitGroundThisFrame = false;

            // A kerekek és a váz közepe (a dir irány megfordítja a kerekeket a fizikában is!)
            const collisionPoints = [
                { rx: -25 * bike.dir, ry: 10, radius: 12 }, // Hátsó
                { rx: 30 * bike.dir,  ry: 10, radius: 12 }, // Első
                { rx: 0,              ry: 0,  radius: 10 }  // Közép
            ];

            for (let p of collisionPoints) {
                let wx = bike.x + Math.cos(bike.angle)*p.rx - Math.sin(bike.angle)*p.ry;
                let wy = bike.y + Math.sin(bike.angle)*p.rx + Math.cos(bike.angle)*p.ry;

                for (let t of terrain) {
                    let closestX = Math.max(t.x, Math.min(wx, t.x + t.w));
                    let closestY = Math.max(t.y, Math.min(wy, t.y + t.h));

                    let dx = wx - closestX;
                    let dy = wy - closestY;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < p.radius) {
                        let nx = dx / distance;
                        let ny = dy / distance;
                        let penetration = p.radius - distance;

                        bike.x += nx * penetration;
                        bike.y += ny * penetration;

                        if (Math.abs(ny) > Math.abs(nx)) {
                            if (ny < 0) { 
                                bike.vy = 0; bike.vx = 0; bike.angVel = 0;
                                hitGroundThisFrame = true;
                                bike.pose = poseStates.GROUNDED; 
                            } else { 
                                bike.vy = Math.abs(bike.vy) * 0.5;
                            }
                        } else { 
                            bike.vx = -bike.vx * bounceFactor;
                            bike.angVel *= -0.3; // Falhoz verődéskor is lassabban rotál
                        }
                    }
                }
            }

            bike.grounded = hitGroundThisFrame;

            if (bike.grounded) {
                // Biztonsági felrántás (orrra esés ellen), figyelembe véve az irányt
                if (bike.angle * bike.dir > 0) {
                    let targetAngle = -0.1 * bike.dir; // Kicsit hátrahúzza a vízszintes felé
                    bike.angle += (targetAngle - bike.angle) * 0.1;
                }
                bike.tuckFactor = Math.max(0, bike.tuckFactor - 0.1); 
            }
            
            // Cél ellenőrzése
            let distToGoal = Math.sqrt(Math.pow(bike.x - goal.x, 2) + Math.pow(bike.y - goal.y, 2));
            if (distToGoal < bike.radius + goal.radius) levelWon = true;

            // Halál zóna (Pályaelhagyás)
            if (bike.y > canvas.height + 100) resetBike();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Pálya
            ctx.fillStyle = "#666";
            for (let t of terrain) ctx.fillRect(t.x, t.y, t.w, t.h);

            // Cél
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#FFD700"; 
            ctx.fill();
            ctx.strokeStyle = "#B8860B";
            ctx.lineWidth = 3;
            ctx.stroke();

            // Célzó vonalak
            if (isDragging) {
                const aimX = dragStart.x - dragCurrent.x;
                const aimY = dragStart.y - dragCurrent.y;
                const pullX = dragCurrent.x - dragStart.x;
                const pullY = dragCurrent.y - dragStart.y;

                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + aimX, bike.y + aimY);
                ctx.strokeStyle = "rgba(0, 150, 0, 0.5)";
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + pullX, bike.y + pullY);
                ctx.strokeStyle = "rgba(255, 0, 0, 0.5)";
                ctx.lineWidth = 3;
                ctx.setLineDash([]);
                ctx.stroke();
            }

            // --- BRINGA RAJZOLÁS ---
            ctx.save();
            ctx.translate(bike.x, bike.y);
            ctx.rotate(bike.angle);
            ctx.scale(bike.dir, 1); // <-- TÜKRÖZŐDÉS ITT TÖRTÉNIK VIZUÁLISAN

            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            ctx.strokeStyle = "#222";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(-25, 10, 12, 0, Math.PI * 2); 
            ctx.moveTo(42, 10);
            ctx.arc(30, 10, 12, 0, Math.PI * 2);  
            ctx.stroke();

            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-25, 10); 
            ctx.lineTo(0, 10);   
            ctx.lineTo(20, -15); 
            ctx.lineTo(25, 10);  
            ctx.moveTo(20, -15); 
            ctx.lineTo(-10, 0);  
            ctx.lineTo(-25, 10); 
            ctx.moveTo(-10, 0);  
            ctx.lineTo(0, 10);   
            ctx.moveTo(-6, 14);
            ctx.lineTo(6, 14);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(20, -15);
            ctx.lineTo(18, -20); 
            ctx.lineTo(22, -22); 
            ctx.stroke();

            // --- ARIFER (Bringás) ---
            ctx.beginPath();
            ctx.strokeStyle = "#1a73e8"; 
            
            const hands = { x: 20, y: -22 };  
            const pedals = { x: 0, y: 10 };   
            
            let butt = { x: -8, y: -12 };   
            let shoulder = { x: 5, y: -28 }; 
            let head = { x: 10, y: -36 };     

            if (isDragging) {
                const pullX = dragCurrent.x - dragStart.x;
                const pullY = dragCurrent.y - dragStart.y;
                
                // Mivel a canvast megfordítottuk (scale), a húzást is meg kell fordítanunk logikailag
                const localPullX = pullX * bike.dir;
                
                let pullLen = Math.sqrt(localPullX*localPullX + pullY*pullY);
                let moveX = 0, moveY = 0;
                
                if (pullLen > 0) {
                    moveX = (localPullX / pullLen) * Math.min(pullLen * 0.1, 15);
                    moveY = (pullY / pullLen) * Math.min(pullLen * 0.1, 15);
                }

                butt.x += moveX;
                butt.y += moveY;
                shoulder.x += moveX * 0.8;
                shoulder.y += moveY * 0.8;
                head.x += moveX * 0.8;
                head.y += moveY * 0.8;

            } else if (!bike.grounded && bike.pose === poseStates.AIRBORNE) {
                butt.x += 6 * bike.tuckFactor;
                butt.y += 4 * bike.tuckFactor;
                shoulder.x += 8 * bike.tuckFactor;
                shoulder.y += 6 * bike.tuckFactor;
                head.x += 8 * bike.tuckFactor;
                head.y += 6 * bike.tuckFactor;
            }

            ctx.moveTo(butt.x, butt.y); 
            ctx.lineTo(shoulder.x, shoulder.y); 
            
            let armMx = (shoulder.x + hands.x) / 2 - 3;
            let armMy = (shoulder.y + hands.y) / 2 - 5;
            ctx.moveTo(shoulder.x, shoulder.y);
            ctx.lineTo(armMx, armMy);
            ctx.lineTo(hands.x, hands.y);
            
            let legMx = (butt.x + pedals.x) / 2 + 8;
            let legMy = (butt.y + pedals.y) / 2 - 2;
            ctx.moveTo(butt.x, butt.y);
            ctx.lineTo(legMx, legMy);
            ctx.lineTo(pedals.x, pedals.y);
            
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(head.x, head.y, 5, 0, Math.PI * 2);
            ctx.stroke();

            ctx.restore();

            if (levelWon) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 40px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("CÉLBA ÉRTÉL!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "20px sans-serif";
                ctx.fillText("Kattints bárhova a következő pályához!", canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        generateLevel();
        gameLoop();
    </script>
</body>
</html>
