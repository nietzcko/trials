<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Trial Bike</title>
    <style>
        :root {
            --bg-color: #111115;
            --platform-body: #1a1a20;
            --neon-main: #00f3ff;
            --neon-alt: #ff0055;
            --neon-goal: #ffd700;
            --ui-bg: rgba(26, 26, 32, 0.9);
            --ui-border: rgba(0, 243, 255, 0.4);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color); 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            touch-action: none; 
            color: var(--text-color);
        }

        canvas {
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            cursor: crosshair;
        }

        #ui-top {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            width: auto;
            max-width: 600px;
        }

        /* Verziószám / Futam számláló a bal alsó sarokban */
        #ui-bottom-left {
            position: absolute;
            bottom: 20px;
            left: 20px;
            pointer-events: none;
        }

        .hud {
            display: inline-block;
            background: var(--ui-bg);
            border: 1px solid var(--ui-border);
            padding: 10px 25px;
            border-radius: 4px;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            backdrop-filter: blur(5px);
        }

        .hud-small {
            padding: 6px 15px;
            font-size: 0.9rem;
            border-color: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
        }

        .heart { color: var(--neon-alt); }
        .score-num { color: var(--neon-goal); font-size: 1.3rem; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="hud">
            <span class="heart">❤</span> <span id="livesDisplay">3</span> &nbsp;|&nbsp; 
            SZINT: <span id="scoreDisplay" class="score-num">0</span>
        </div>
    </div>

    <div id="ui-bottom-left">
        <div class="hud hud-small" id="generationDisplay">RUN #0</div>
    </div>

    <canvas id="gameCanvas" width="600" height="900"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const generationDisplay = document.getElementById('generationDisplay');

        // JÁTÉK ÁLLAPOTOK
        const STATE_PLAYING = 0;
        const STATE_CRASHED = 1;  
        const STATE_GAMEOVER = 2; 

        let gameState = STATE_PLAYING;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        
        // --- ÚJ VÁLTOZÓK A FUTAM SZÁMOLÁSÁHOZ ÉS A LIMITHEZ ---
        let generationCount = 0; // Futam (Verzió) számláló
        const maxDragDistance = 220; // MAXIMUM HÚZÁSI TÁVOLSÁG LIMIT (PIXEL)

        let score = 0;
        let lives = 3;
        let cameraY = 0;
        let targetCameraY = 0;
        let lastCheckpoint = { x: 300, y: 800 };
        let pulseGlow = 0; 
        let bgPulse = 0; // Háttér animációhoz

        // SZÍNEK (CSS változókból)
        const getCSSVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        const colors = {
            main: getCSSVar('--neon-main'),
            alt: getCSSVar('--neon-alt'),
            goal: getCSSVar('--neon-goal'),
            platform: getCSSVar('--platform-body'),
            bg: getCSSVar('--bg-color')
        };

        const jumpPower = 0.045; 
        const gravity = 0.4;
        const bounceFactor = 0.4; 
        const poseStates = { GROUNDED: 0, AIRBORNE: 1, TAKING_OFF: 2 }; 

        let bike = {
            x: 300, y: 800, vx: 0, vy: 0, radius: 15, 
            angle: 0, angVel: 0, grounded: false,
            pose: poseStates.GROUNDED, tuckFactor: 0,
            dir: 1 
        };

        let terrain = [];
        let goal = { x: 0, y: 0, radius: 20 };

        function updateHUD() {
            scoreDisplay.innerText = score;
            livesDisplay.innerText = lives;
        }

        function generateChunk(startY, endY) {
            const goalPlatform = { 
                x: 150 + Math.random() * 300, 
                y: endY + 20, 
                w: 120, 
                h: 20 
            };
            terrain.push(goalPlatform);
            goal.x = goalPlatform.x + goalPlatform.w / 2;
            goal.y = goalPlatform.y - 20;

            const minGap = 100; 
            let currentY = startY - minGap - 30; 
            
            while(currentY > endY + minGap) {
                let pHeight = 20;
                let pWidth = 80 + Math.random() * 60; 
                let pX = 30 + Math.random() * (canvas.width - pWidth - 60);

                terrain.push({
                    x: pX,
                    y: currentY,
                    w: pWidth,
                    h: pHeight
                });
                
                currentY -= (minGap + pHeight + Math.random() * 40);
            }
        }

        // --- ÚJ GENERÁLÁS SZÁMLÁLÁS ---
        function initGame() {
            generationCount++; // Növeljük a futam számát
            generationDisplay.innerText = `RUN #${generationCount}`; // Frissítjük a kijelzőt
            
            score = 0;
            lives = 3;
            cameraY = 0;
            targetCameraY = 0;
            terrain = [];
            updateHUD();
            
            terrain.push({ x: 0, y: 850, w: 600, h: 50 }); 
            
            generateChunk(850, 150);
            lastCheckpoint = { x: 300, y: 800 };
            gameState = STATE_PLAYING;
            resetToCheckpoint();
        }

        function resetToCheckpoint() {
            bike.x = lastCheckpoint.x;
            bike.y = lastCheckpoint.y;
            bike.vx = 0;
            bike.vy = 0;
            bike.angle = 0;
            bike.angVel = 0;
            bike.pose = poseStates.GROUNDED;
            bike.grounded = true;
            bike.tuckFactor = 0;
            isDragging = false;
            
            targetCameraY = bike.y - 700;
            cameraY = targetCameraY; 
        }

        function triggerCrash() {
            lives--;
            updateHUD();
            if (lives > 0) gameState = STATE_CRASHED; 
            else gameState = STATE_GAMEOVER; 
            isDragging = false;
        }

        function getPointerPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY + cameraY 
            };
        }

        function startDrag(x, y) {
            if (gameState === STATE_CRASHED) { gameState = STATE_PLAYING; resetToCheckpoint(); return; }
            if (gameState === STATE_GAMEOVER) { initGame(); return; }

            if (bike.grounded && gameState === STATE_PLAYING) {
                isDragging = true;
                dragStart = { x, y };
                dragCurrent = { x, y };
                bike.pose = poseStates.TAKING_OFF; 
            }
        }

        function moveDrag(x, y) {
            if (isDragging && gameState === STATE_PLAYING) {
                dragCurrent = { x, y };
                const pullX = dragCurrent.x - dragStart.x;
                if (pullX < -10) bike.dir = 1; 
                else if (pullX > 10) bike.dir = -1; 
            }
        }

        // --- ÚJ JAVÍTOTT JUMP CAPPING ---
        function endDrag() {
            if (isDragging && gameState === STATE_PLAYING) {
                isDragging = false;
                let aimX = dragStart.x - dragCurrent.x;
                let aimY = dragStart.y - dragCurrent.y;
                let aimLen = Math.sqrt(aimX * aimX + aimY * aimY);

                // --- ÚJ LIMIT LOGIKA ---
                if (aimLen > maxDragDistance) {
                    // Ha túlhúzta, visszakorlátozzuk a limitre
                    aimX = (aimX / aimLen) * maxDragDistance;
                    aimY = (aimY / aimLen) * maxDragDistance;
                    aimLen = maxDragDistance; // frissítés a dőléshez
                }
                
                if (aimLen > 5) {
                    bike.vx = aimX * jumpPower;
                    bike.vy = aimY * jumpPower;
                    
                    // Lassú forgás: -0.0003 radián per pixel ugróerő
                    bike.angVel = aimX * -0.0003; 
                    
                    if (bike.angVel > 0.025) bike.angVel = 0.025;
                    if (bike.angVel < -0.025) bike.angVel = -0.025;
                    
                    bike.grounded = false;
                    bike.pose = poseStates.AIRBORNE; 
                    bike.tuckFactor = 0; 
                } else {
                    bike.pose = poseStates.GROUNDED; 
                }
            }
        }

        // Event Listenerek...
        canvas.addEventListener('mousedown', (e) => { const pos = getPointerPos(e.clientX, e.clientY); startDrag(pos.x, pos.y); });
        canvas.addEventListener('mousemove', (e) => { const pos = getPointerPos(e.clientX, e.clientY); moveDrag(pos.x, pos.y); });
        window.addEventListener('mouseup', endDrag);

        canvas.addEventListener('touchstart', (e) => { const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY); startDrag(pos.x, pos.y); });
        canvas.addEventListener('touchmove', (e) => { const pos = getPointerPos(e.touches[0].clientX, e.touches[0].clientY); moveDrag(pos.x, pos.y); });
        window.addEventListener('touchend', endDrag);

        function updatePhysics() {
            targetCameraY = bike.y - 700;
            cameraY += (targetCameraY - cameraY) * 0.06;

            pulseGlow = (pulseGlow + 0.05) % (Math.PI * 2);
            bgPulse = (bgPulse + 0.002) % (Math.PI * 2);

            if (gameState !== STATE_PLAYING) return;

            bike.vy += gravity;

            if (!bike.grounded) {
                bike.tuckFactor = Math.min(1, bike.tuckFactor + 0.05);
            }

            if (isDragging && bike.grounded) {
                const pullX = dragCurrent.x - dragStart.x;
                const pullY = dragCurrent.y - dragStart.y;
                let localPullX = pullX * bike.dir; 
                let pullLen = Math.sqrt(localPullX*localPullX + pullY*pullY);
                
                // --- LIMIT LOGIKA A DŐLÉSHEZ ---
                let tiltAmount = Math.min(pullLen, maxDragDistance) / maxDragDistance; 
                let targetAngle = -0.5 * tiltAmount * bike.dir; 
                bike.angle += (targetAngle - bike.angle) * 0.15;
            }

            bike.x += bike.vx;
            bike.y += bike.vy;
            bike.angle += bike.angVel;

            while (bike.angle > Math.PI) bike.angle -= Math.PI * 2;
            while (bike.angle < -Math.PI) bike.angle += Math.PI * 2;

            let headRx = 10 * bike.dir; 
            let headRy = -55;
            let headWx = bike.x + Math.cos(bike.angle)*headRx - Math.sin(bike.angle)*headRy;
            let headWy = bike.y + Math.sin(bike.angle)*headRx + Math.cos(bike.angle)*headRy;
            
            for (let t of terrain) {
                let closestX = Math.max(t.x, Math.min(headWx, t.x + t.w));
                let closestY = Math.max(t.y, Math.min(headWy, t.y + t.h));
                let dx = headWx - closestX;
                let dy = headWy - closestY;
                if (Math.sqrt(dx*dx + dy*dy) < 12) { triggerCrash(); return; }
            }

            let hitGroundThisFrame = false;

            const collisionPoints = [
                { rx: -25 * bike.dir, ry: 10, radius: 12 }, 
                { rx: 30 * bike.dir,  ry: 10, radius: 12 }, 
                { rx: 0,              ry: 0,  radius: 10 }  
            ];

            for (let p of collisionPoints) {
                let wx = bike.x + Math.cos(bike.angle)*p.rx - Math.sin(bike.angle)*p.ry;
                let wy = bike.y + Math.sin(bike.angle)*p.rx + Math.cos(bike.angle)*p.ry;

                if (wx - p.radius < 0) { bike.x += Math.abs(wx - p.radius); bike.vx = Math.abs(bike.vx) * bounceFactor; bike.angVel *= -0.3; wx = p.radius; }
                if (wx + p.radius > canvas.width) { bike.x -= Math.abs((wx + p.radius) - canvas.width); bike.vx = -Math.abs(bike.vx) * bounceFactor; bike.angVel *= -0.3; wx = canvas.width - p.radius; }

                for (let t of terrain) {
                    let closestX = Math.max(t.x, Math.min(wx, t.x + t.w));
                    let closestY = Math.max(t.y, Math.min(wy, t.y + t.h));

                    let dx = wx - closestX;
                    let dy = wy - closestY;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < p.radius) {
                        let nx = dx / distance;
                        let ny = dy / distance;
                        let penetration = p.radius - distance;

                        bike.x += nx * penetration;
                        bike.y += ny * penetration;

                        if (Math.abs(ny) > Math.abs(nx)) {
                            if (ny < 0) { bike.vy = 0; bike.vx = 0; bike.angVel = 0; hitGroundThisFrame = true; bike.pose = poseStates.GROUNDED; }
                            else bike.vy = Math.abs(bike.vy) * 0.5;
                        } else { bike.vx = -bike.vx * bounceFactor; bike.angVel *= -0.3; }
                    }
                }
            }

            bike.grounded = hitGroundThisFrame;

            if (bike.grounded && !isDragging) {
                if (bike.angle * bike.dir > 0) { let targetAngle = -0.1 * bike.dir; bike.angle += (targetAngle - bike.angle) * 0.1; }
                bike.tuckFactor = Math.max(0, bike.tuckFactor - 0.1); 
            }
            
            let distToGoal = Math.sqrt(Math.pow(bike.x - goal.x, 2) + Math.pow(bike.y - goal.y, 2));
            if (distToGoal < bike.radius + goal.radius) {
                score++;
                if (score % 5 === 0) lives++;
                updateHUD();
                lastCheckpoint = { x: goal.x, y: goal.y - 20 };
                let newEndY = goal.y - 800; 
                generateChunk(goal.y, newEndY);
                terrain = terrain.filter(t => t.y < cameraY + 1500);
            }

            if (bike.y > cameraY + canvas.height + 150) triggerCrash();
        }

        function draw() {
            // SZÉP, MINIMALISTA PULZÁLÓ HÁTTÉR
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let centerPulse = Math.sin(bgPulse) * 0.03 + 0.03;
            ctx.fillStyle = `rgba(255, 255, 255, ${centerPulse})`;
            ctx.fillRect(15, 0, canvas.width - 30, canvas.height); // Finom fény középen

            ctx.save();
            ctx.translate(0, -cameraY);

            // Végtelen falak vizuálisan letisztultan
            ctx.fillStyle = "rgba(255, 255, 255, 0.03)";
            ctx.fillRect(0, cameraY - 100, 15, canvas.height + 200); 
            ctx.fillRect(canvas.width - 15, cameraY - 100, 15, canvas.height + 200); 

            // DIZÁJN: Minimalista platformok éles neon highlighttal
            ctx.lineJoin = "miter";
            ctx.lineCap = "butt";
            for (let t of terrain) {
                // Alap sötét test
                ctx.fillStyle = colors.platform;
                ctx.fillRect(t.x, t.y, t.w, t.h);
                // Felső él (Lézer vonal)
                ctx.beginPath();
                ctx.moveTo(t.x, t.y + 1);
                ctx.lineTo(t.x + t.w, t.y + 1);
                ctx.lineWidth = 2;
                // A célplatform arany, a többi cián
                ctx.strokeStyle = t.w === 120 ? colors.goal : colors.main; 
                ctx.stroke();
            }

            // LÜKTETŐ PLAZMA CÉL
            ctx.beginPath();
            ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
            let glow = 10 + Math.sin(pulseGlow) * 4;
            ctx.fillStyle = "rgba(255, 215, 0, 0.8)"; 
            ctx.fill();
            ctx.shadowBlur = glow * 2;
            ctx.shadowColor = colors.goal;
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.shadowBlur = 0; // Reset árnyék

            // --- ÚJ LIMIT-HEZ IGAZÍTOTT CÉLZÓ VONALAK ---
            if (isDragging && gameState === STATE_PLAYING) {
                let aimX = dragStart.x - dragCurrent.x;
                let aimY = dragStart.y - dragCurrent.y;
                let dragX = dragCurrent.x - dragStart.x;
                let dragY = dragCurrent.y - dragStart.y;
                let aimLen = Math.sqrt(aimX * aimX + aimY * aimY);

                // --- ÚJ LIMIT LOGIKA A MEGJELENÍTÉSHEZ IS ---
                if (aimLen > maxDragDistance) {
                    aimX = (aimX / aimLen) * maxDragDistance;
                    aimY = (aimY / aimLen) * maxDragDistance;
                    dragX = (dragX / aimLen) * maxDragDistance;
                    dragY = (dragY / aimLen) * maxDragDistance;
                }

                // Szaggatott zöld: Ugrás iránya
                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + aimX, bike.y + aimY);
                ctx.strokeStyle = "rgba(0, 255, 0, 0.5)";
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 6]);
                ctx.stroke();
                
                // Piros folytonos: Csúzli gumi (A maximum limitet jelző végponttal)
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(bike.x, bike.y);
                ctx.lineTo(bike.x + dragX, bike.y + dragY);
                ctx.strokeStyle = "rgba(255, 0, 85, 0.6)";
                ctx.lineWidth = 3;
                ctx.stroke();

                // Kis kereszt a végére, ha elérte a limitet
                if (aimLen >= maxDragDistance) {
                    ctx.beginPath(); ctx.fillStyle = colors.alt;
                    ctx.arc(bike.x + dragX, bike.y + dragY, 4, 0, Math.PI * 2); ctx.fill();
                }
            }

            // --- BRINGA RAJZOLÁS ---
            ctx.save();
            ctx.translate(bike.x, bike.y);
            ctx.rotate(bike.angle);
            ctx.scale(bike.dir, 1); 

            ctx.lineCap = "square"; ctx.lineJoin = "miter";

            // HUBLESS KEREKEK
            ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 4;
            
            // Hátsó
            ctx.beginPath(); ctx.arc(-25, 10, 12, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(-25, 10, 8, 0, Math.PI * 2); ctx.strokeStyle = colors.main; ctx.lineWidth = 1; ctx.stroke();
            
            // Első
            ctx.beginPath(); ctx.arc(30, 10, 12, 0, Math.PI * 2); ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 4; ctx.stroke();
            ctx.beginPath(); ctx.arc(30, 10, 8, 0, Math.PI * 2); ctx.strokeStyle = colors.main; ctx.lineWidth = 1; ctx.stroke();

            // Váz
            ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-25, 10); ctx.lineTo(0, 10); ctx.lineTo(20, -15); ctx.lineTo(25, 10); 
            ctx.moveTo(20, -15); ctx.lineTo(-10, 0); ctx.lineTo(-25, 10); ctx.moveTo(-10, 0); ctx.lineTo(0, 10);
            ctx.stroke();

            ctx.beginPath(); ctx.moveTo(20, -15); ctx.lineTo(18, -20); ctx.lineTo(22, -22); ctx.stroke();

            // --- NEON ARIFER ---
            ctx.beginPath();
            // Piros ha meghal, világító ciánkék ha él
            ctx.strokeStyle = gameState !== STATE_PLAYING ? colors.alt : colors.main; 
            ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = ctx.strokeStyle;
            
            const hands = { x: 20, y: -22 }; const pedals = { x: 0, y: 10 };   
            
            let butt = { x: -12, y: -22 }; let shoulder = { x: 5, y: -45 }; let head = { x: 10, y: -55 };     

            if (isDragging && gameState === STATE_PLAYING) {
                const pullX = dragCurrent.x - dragStart.x;
                const pullY = dragCurrent.y - dragStart.y;
                const localPullX = pullX * bike.dir;
                let pullLen = Math.sqrt(localPullX*localPullX + pullY*pullY);
                let moveX = 0, moveY = 0;
                
                if (pullLen > 0) {
                    // Itt is capped a mozgás
                    let moveDist = Math.min(pullLen, maxDragDistance);
                    moveX = (localPullX / pullLen) * (moveDist * 0.15);
                    moveY = (pullY / pullLen) * (moveDist * 0.15);
                }

                butt.x += moveX * 0.8; butt.y += moveY * 0.8;
                shoulder.x += moveX; shoulder.y += moveY; head.x += moveX; head.y += moveY;

            } else if (!bike.grounded && bike.pose === poseStates.AIRBORNE) {
                butt.x += 10 * bike.tuckFactor; butt.y += 8 * bike.tuckFactor;
                shoulder.x += 12 * bike.tuckFactor; shoulder.y += 10 * bike.tuckFactor;
                head.x += 12 * bike.tuckFactor; head.y += 10 * bike.tuckFactor;
            }

            ctx.moveTo(butt.x, butt.y); ctx.lineTo(shoulder.x, shoulder.y); 
            
            let armMx = (shoulder.x + hands.x) / 2 - 5; let armMy = (shoulder.y + hands.y) / 2 - 8;
            ctx.moveTo(shoulder.x, shoulder.y); ctx.lineTo(armMx, armMy); ctx.lineTo(hands.x, hands.y);
            
            let legMx = (butt.x + pedals.x) / 2 + 12; let legMy = (butt.y + pedals.y) / 2 - 4;
            ctx.moveTo(butt.x, butt.y); ctx.lineTo(legMx, legMy); ctx.lineTo(pedals.x, pedals.y);
            
            ctx.stroke();

            ctx.beginPath(); ctx.arc(head.x, head.y, 8, 0, Math.PI * 2); 
            ctx.fillStyle = ctx.strokeStyle; ctx.fill();

            ctx.shadowBlur = 0; ctx.restore();
            ctx.restore(); 

            // --- OVERLAY SZÖVEGEK ---
            if (gameState === STATE_CRASHED) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.4)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff"; ctx.font = "bold 40px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("BUKTÁL!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "18px sans-serif"; ctx.fillText("Kattints a folytatáshoz (-1 élet)", canvas.width / 2, canvas.height / 2 + 20);
            } else if (gameState === STATE_GAMEOVER) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = colors.alt; ctx.font = "bold 50px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);
                ctx.font = "24px sans-serif"; ctx.fillStyle = colors.goal; ctx.fillText(`ELÉRT SZINT: ${score}`, canvas.width / 2, canvas.height / 2 + 10);
                ctx.fillStyle = "#fff"; ctx.font = "16px sans-serif"; ctx.fillText("Kattints bárhova az újrakezdéshez!", canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>
