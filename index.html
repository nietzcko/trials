<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Trial - Clean & Dynamic</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --grid-color: #1f2833;
            --platform-body: #1c232d;
            --neon-main: #00f3ff;
            --neon-alt: #ffd700;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color); 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            touch-action: none; 
        }

        canvas {
            max-width: 100vw;
            max-height: 100vh;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #ui-top {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .hud {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: var(--text-color);
            text-transform: uppercase;
        }

        .score-num { color: var(--neon-alt); text-shadow: 0 0 10px var(--neon-alt); }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="hud">SCORE: <span id="scoreDisplay" class="score-num">0</span></div>
    </div>

    <canvas id="gameCanvas" width="540" height="960"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');

        const STATE_PLAYING = 0;
        const STATE_GAMEOVER = 1; 

        let gameState = STATE_PLAYING;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        
        const maxDragDistance = 220;
        let score = 0;
        
        let cameraX = 0, cameraY = 0;
        let genX = 0, genY = 600;

        const getCSSVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        const colors = {
            main: getCSSVar('--neon-main'),
            alt: getCSSVar('--neon-alt'),
            platform: getCSSVar('--platform-body'),
            bg: getCSSVar('--bg-color'),
            grid: getCSSVar('--grid-color')
        };

        const gravity = 0.4;
        const jumpPower = 0.045;
        const bounceFactor = 0.3;

        let bike = {
            x: 100, y: 550, vx: 0, vy: 0, radius: 15, 
            angle: 0, angVel: 0, grounded: false, tuckFactor: 0
        };

        let terrain = [];
        let tutorialTexts = [];

        function generateObstacle() {
            let gapX = 80 + Math.random() * 100;
            let startX = genX + gapX;
            let type = Math.floor(Math.random() * 6);
            
            if (genY < 300) type = Math.max(type, 3);
            if (genY > 750) type = Math.min(type, 2);

            let w = 40 + Math.random() * 80;
            let y = genY + (Math.random() * 300 - 150);

            if (type === 0) { // Rect
                terrain.push({type: 'rect', x: startX, y: y, w: w, h: 40, landed: false});
                genX = startX + w; genY = y;
            } else if (type === 1) { // Circle
                let r = 25 + Math.random() * 20;
                terrain.push({type: 'circle', x: startX + r, y: y, r: r, landed: false});
                genX = startX + r * 2; genY = y - r;
            } else if (type === 2 || type === 3) { // Steps
                let stepW = 40, currX = startX, currY = genY;
                let dirY = type === 2 ? -45 : 45;
                for(let i=0; i<3; i++) {
                    terrain.push({type: 'rect', x: currX, y: currY, w: stepW, h: 40, landed: false});
                    currX += stepW + 20; currY += dirY;
                }
                genX = currX; genY = currY - dirY;
            } else { // Slope
                let angle = type === 4 ? -0.45 : 0.45;
                let sw = 100 + Math.random() * 50;
                terrain.push({type: 'slope', x: startX, y: genY, w: sw, h: 20, angle: angle, landed: false});
                genX = startX + sw * Math.cos(angle); genY = genY + sw * Math.sin(angle);
            }
        }

        function initGame() {
            score = 0; terrain = []; scoreDisplay.innerText = "0";
            cameraX = 0; cameraY = 0; genX = 1600; genY = 600;
            bike = { x: 100, y: 550, vx: 0, vy: 0, radius: 15, angle: 0, angVel: 0, grounded: true, tuckFactor: 0 };
            
            terrain.push({ type: 'rect', x: -500, y: 600, w: 2100, h: 200, landed: true });
            terrain.push({ type: 'rect', x: 450, y: 530, w: 150, h: 30, landed: false });
            terrain.push({ type: 'rect', x: 750, y: 460, w: 120, h: 30, landed: false });
            
            tutorialTexts = [
                { t: "DRAG BACK TO AIM", x: 250, y: 480 },
                { t: "LAND ON YELLOW FOR POINTS", x: 800, y: 350 }
            ];

            for(let i=0; i<10; i++) generateObstacle();
            gameState = STATE_PLAYING;
        }

        function checkCollision(px, py, r, t) {
            if (t.type === 'circle') {
                let dx = px - t.x, dy = py - t.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < r + t.r) return { hit: true, nx: dx/dist, ny: dy/dist, pen: (r + t.r) - dist };
            } else if (t.type === 'slope') {
                let cx = t.x + t.w/2, cy = t.y + t.h/2;
                let dx = px - cx, dy = py - cy;
                let rdx = dx * Math.cos(-t.angle) - dy * Math.sin(-t.angle);
                let rdy = dx * Math.sin(-t.angle) + dy * Math.cos(-t.angle);
                let closestX = Math.max(t.x, Math.min(cx + rdx, t.x + t.w));
                let closestY = Math.max(t.y, Math.min(cy + rdy, t.y + t.h));
                let ldx = (cx + rdx) - closestX, ldy = (cy + rdy) - closestY;
                let dist = Math.sqrt(ldx*ldx + ldy*ldy);
                if (dist < r) {
                    let nx = (dist===0?0:ldx/dist) * Math.cos(t.angle) - (dist===0?-1:ldy/dist) * Math.sin(t.angle);
                    let ny = (dist===0?0:ldx/dist) * Math.sin(t.angle) + (dist===0?-1:ldy/dist) * Math.cos(t.angle);
                    return { hit: true, nx, ny, pen: r - dist };
                }
            } else {
                let cX = Math.max(t.x, Math.min(px, t.x + t.w));
                let cY = Math.max(t.y, Math.min(py, t.y + t.h));
                let dx = px - cX, dy = py - cY, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < r) return { hit: true, nx: dist===0?0:dx/dist, ny: dist===0?-1:dy/dist, pen: r - dist };
            }
            return { hit: false };
        }

        function update() {
            if (gameState !== STATE_PLAYING) return;

            bike.vy += gravity;
            if (isDragging && bike.grounded) {
                let tilt = Math.max(-0.65, Math.min(0.65, (dragCurrent.x - dragStart.x) / maxDragDistance));
                bike.angle += (tilt - bike.angle) * 0.15;
            }

            bike.x += bike.vx; bike.y += bike.vy; bike.angle += bike.angVel;
            if (bike.x > genX - 1200) generateObstacle();

            if (!bike.grounded) bike.tuckFactor = Math.min(1, bike.tuckFactor + 0.1);
            else bike.tuckFactor = Math.max(0, bike.tuckFactor - 0.2);

            let groundedThisFrame = false;
            const pts = [{dx: -25, dy: 10}, {dx: 30, dy: 10}, {dx: 0, dy: 0}];
            
            pts.forEach(p => {
                let wx = bike.x + Math.cos(bike.angle)*p.dx - Math.sin(bike.angle)*p.dy;
                let wy = bike.y + Math.sin(bike.angle)*p.dx + Math.cos(bike.angle)*p.dy;
                terrain.forEach(t => {
                    let c = checkCollision(wx, wy, 12, t);
                    if (c.hit) {
                        bike.x += c.nx * c.pen; bike.y += c.ny * c.pen;
                        if (c.ny < -0.5) {
                            bike.vy = 0; bike.vx = 0; bike.angVel = 0;
                            groundedThisFrame = true;
                            if (!t.landed) { t.landed = true; score++; scoreDisplay.innerText = score; }
                        } else {
                            bike.vx *= -bounceFactor; bike.vy *= -bounceFactor;
                        }
                    }
                });
            });

            // Head death check
            let hx = bike.x + Math.cos(bike.angle)*10 - Math.sin(bike.angle)*-55;
            let hy = bike.y + Math.sin(bike.angle)*10 + Math.cos(bike.angle)*-55;
            terrain.forEach(t => { if(checkCollision(hx, hy, 12, t).hit) gameState = STATE_GAMEOVER; });

            bike.grounded = groundedThisFrame;
            if (bike.y > cameraY + 1300) gameState = STATE_GAMEOVER;

            cameraX += (bike.x - 150 - cameraX) * 0.1;
            cameraY += (bike.y - 650 - cameraY) * 0.1;
        }

        function draw() {
            ctx.fillStyle = colors.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = colors.grid; ctx.lineWidth = 1;
            let gridSize = 100;
            for(let x = -cameraX % gridSize; x < canvas.width; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for(let y = -cameraY % gridSize; y < canvas.height; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            ctx.save(); ctx.translate(-cameraX, -cameraY);

            // Tutorial
            ctx.fillStyle = "rgba(0, 243, 255, 0.4)"; ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center";
            tutorialTexts.forEach(t => ctx.fillText(t.t, t.x, t.y));

            // Terrain
            terrain.forEach(t => {
                ctx.fillStyle = colors.platform;
                let stroke = t.landed ? colors.alt : colors.main;
                ctx.strokeStyle = stroke; ctx.lineWidth = 3;
                
                if (t.type === 'rect') {
                    ctx.fillRect(t.x, t.y, t.w, t.h);
                    ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.x + t.w, t.y); ctx.stroke();
                } else if (t.type === 'circle') {
                    ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                } else if (t.type === 'slope') {
                    ctx.save(); ctx.translate(t.x + t.w/2, t.y + t.h/2); ctx.rotate(t.angle);
                    ctx.fillRect(-t.w/2, -t.h/2, t.w, t.h);
                    ctx.beginPath(); ctx.moveTo(-t.w/2, -t.h/2); ctx.lineTo(t.w/2, -t.h/2); ctx.stroke();
                    ctx.restore();
                }
            });

            // Slingshot
            if (isDragging && bike.grounded) {
                let dx = dragStart.x - dragCurrent.x, dy = dragStart.y - dragCurrent.y;
                ctx.setLineDash([5, 5]); ctx.strokeStyle = colors.main;
                ctx.beginPath(); ctx.moveTo(bike.x, bike.y); ctx.lineTo(bike.x + dx, bike.y + dy); ctx.stroke();
                ctx.setLineDash([]);
            }

            // Bike & Rider
            ctx.save(); ctx.translate(bike.x, bike.y); ctx.rotate(bike.angle);
            
            // Wheels
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(-25, 10, 12, 0, 7); ctx.stroke();
            ctx.beginPath(); ctx.arc(30, 10, 12, 0, 7); ctx.stroke();
            
            // Frame
            ctx.strokeStyle = "rgba(100,105,115,1)";
            ctx.beginPath(); ctx.moveTo(-25, 10); ctx.lineTo(0, 10); ctx.lineTo(20, -15); ctx.lineTo(30, 10);
            ctx.lineTo(20, -15); ctx.lineTo(-10, 0); ctx.lineTo(-25, 10); ctx.stroke();
            
            // Rider Animation
            let butt = {x: -12 + (bike.tuckFactor * 8), y: -22 + (bike.tuckFactor * 5)};
            let shoulder = {x: 5 + (bike.tuckFactor * 10), y: -45 + (bike.tuckFactor * 10)};
            let head = {x: shoulder.x + 5, y: shoulder.y - 10};
            
            ctx.strokeStyle = colors.main; ctx.shadowBlur = 10; ctx.shadowColor = colors.main;
            ctx.beginPath(); 
            ctx.moveTo(0, 10); ctx.lineTo(butt.x, butt.y); // Leg
            ctx.lineTo(shoulder.x, shoulder.y); // Torso
            ctx.lineTo(20, -15); // Arm
            ctx.stroke();
            
            ctx.beginPath(); ctx.arc(head.x, head.y, 8, 0, 7); ctx.fillStyle = colors.main; ctx.fill();
            ctx.restore();

            ctx.restore();

            if (gameState === STATE_GAMEOVER) {
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = colors.alt; ctx.font = "bold 50px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("CRASHED", canvas.width/2, canvas.height/2);
                ctx.font = "20px sans-serif"; ctx.fillStyle = "#fff";
                ctx.fillText("TAP TO RESTART", canvas.width/2, canvas.height/2 + 55);
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        function handleStart(e) {
            const p = {x: e.clientX || e.touches[0].clientX, y: e.clientY || e.touches[0].clientY};
            if(gameState === STATE_GAMEOVER) initGame();
            else if(bike.grounded) { isDragging = true; dragStart = p; dragCurrent = p; }
        }
        function handleMove(e) { if(isDragging) dragCurrent = {x: e.clientX || e.touches[0].clientX, y: e.clientY || e.touches[0].clientY}; }
        function handleEnd() {
            if(isDragging) {
                let dx = dragStart.x - dragCurrent.x, dy = dragStart.y - dragCurrent.y;
                bike.vx = dx * jumpPower; bike.vy = dy * jumpPower;
                bike.angVel = dx * -0.0003; bike.grounded = false; isDragging = false;
            }
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);

        initGame(); loop();
    </script>
</body>
</html>
